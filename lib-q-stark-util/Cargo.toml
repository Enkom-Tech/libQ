[package]
name = "lib-q-stark-util"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "A collection of utility functions and tools for low-level operations, such as bit manipulation and array transformations."
license.workspace = true
repository.workspace = true
readme.workspace = true

[dependencies]
rayon = { workspace = true, optional = true }
serde = { workspace = true }

[dev-dependencies]
rand = { workspace = true }
serde_json = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
criterion = { workspace = true }

[features]
# Not supported on wasm32-unknown-unknown (see `compile_error!` in `src/lib.rs`).
parallel = ["rayon"]

[[bench]]
name = "bit_reverse"
harness = false

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }
