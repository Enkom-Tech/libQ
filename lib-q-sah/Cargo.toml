[package]
name = "lib-q-sah"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "Stream-AEAD-H (S-A-H): high-throughput, nonce-sensitive AEAD for lib-Q"
license.workspace = true
repository.workspace = true
keywords = ["cryptography", "aead", "stream-cipher", "arx", "post-quantum"]
categories = ["cryptography", "no-std"]
readme = "README.md"

[dependencies]
lib-q-core = { path = "../lib-q-core", version = "0.0.7" }
zeroize = { workspace = true, default-features = false, features = ["derive"] }
subtle = { workspace = true, default-features = false }

[dev-dependencies]
serde_json = { workspace = true, features = ["std", "alloc"] }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
criterion = { workspace = true }

[features]
default = ["aead", "alloc"]
std = ["alloc"]
alloc = ["lib-q-core/alloc", "zeroize/alloc"]
aead = []
# WASM: ensure lib-q-core (and getrandom) compile for wasm32-unknown-unknown.
wasm = ["lib-q-core/wasm_getrandom"]

[lib]
bench = false
name = "lib_q_sah"
path = "src/lib.rs"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[[test]]
name = "kat_tests"
path = "tests/kat_tests.rs"
required-features = ["alloc"]

[[test]]
name = "boundary_tests"
path = "tests/boundary_tests.rs"
required-features = ["alloc"]

[[test]]
name = "tamper_tests"
path = "tests/tamper_tests.rs"
required-features = ["alloc"]

[[test]]
name = "spec_pin"
path = "tests/spec_pin.rs"
required-features = ["alloc"]

[[bench]]
name = "sah_criterion_benches"
harness = false
required-features = ["alloc"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(docsrs)',
    'cfg(target_arch, values("wasm32"))',
] }
