[package]
name = "lib-q-stark-commit"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "A framework for implementing various cryptographic commitment schemes, including non-hiding variants."
license.workspace = true
repository.workspace = true
readme.workspace = true

[dependencies]
lib-q-stark-field = { path = "../lib-q-stark-field" }
lib-q-stark-matrix = { path = "../lib-q-stark-matrix" }
lib-q-stark-util = { path = "../lib-q-stark-util" }

itertools = { workspace = true }
serde = { workspace = true, default-features = false }

[features]
default = ["alloc"]
std = ["alloc"]
alloc = []
no_std = []

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }
