[package]
name = "lib-q-random"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
readme.workspace = true
description = "Unified secure random number generation for libQ post-quantum cryptography library"
keywords = ["cryptography", "post-quantum", "security", "rng", "entropy"]
categories = ["cryptography", "wasm"]

[dependencies]
lib-q-core = { path = "../lib-q-core", features = ["alloc"], optional = true }
lib-q-hash = { path = "../lib-q-hash", optional = true }
rand_core = { workspace = true, default-features = false }
getrandom = { version = "0.3.3", optional = true, default-features = false }
rand = { workspace = true, default-features = false, optional = true }
zeroize = { workspace = true, features = ["derive"], default-features = false, optional = true }
wasm-bindgen = { workspace = true, optional = true }
aes = { version = "0.8.4", default-features = false, optional = true }
signature = { version = "3.0.0-rc.5", features = ["rand_core"], optional = true }

[features]
default = ["std", "secure", "zeroize"]
std = ["dep:getrandom", "dep:rand", "alloc", "dep:lib-q-core"]
alloc = ["dep:lib-q-core"]

# no_std support - requires getrandom or custom-entropy
no_std = ["getrandom"]

# RNG provider features
secure = ["dep:getrandom", "dep:rand"]
deterministic = []
hardware = []
getrandom = ["dep:getrandom"]
signature = ["dep:signature"]

# Specialized implementations
hash = ["dep:lib-q-hash"]
classical-mceliece = []
hpke = ["hash"]
fn-dsa = []
hqc = ["alloc"]  # HQC reference implementation in tests (requires Vec)
nist-drbg = ["dep:aes", "alloc"]  # NIST AES256-CTR-DRBG for KAT compliance

# Additional features for specialized implementations
rand = ["dep:rand"]

# Security features
zeroize = ["dep:zeroize"]
entropy-validation = []

# Development features
test-vectors = []

# Platform-specific features
wasm = ["dep:wasm-bindgen", "dep:getrandom", "getrandom/wasm_js", "custom-entropy"]
js = ["dep:getrandom", "getrandom/std"]

# Custom entropy source features
custom-entropy = []

[dev-dependencies]
criterion = { workspace = true }
hex = { workspace = true }
proptest = { workspace = true }

[[bench]]
name = "rng_benchmarks"
harness = false

[package.metadata.docs.rs]
features = ["std", "secure", "zeroize", "entropy-validation", "custom-entropy"]
rustdoc-args = ["--cfg", "docsrs"]
