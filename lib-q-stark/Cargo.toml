[package]
name = "lib-q-stark"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "A minimal univariate STARK framework providing core components for proof generation and verification."
license.workspace = true
repository.workspace = true
readme.workspace = true

[dependencies]
lib-q-stark-air = { path = "../lib-q-stark-air" }
lib-q-stark-challenger = { path = "../lib-q-stark-challenger" }
lib-q-stark-commit = { path = "../lib-q-stark-commit" }
lib-q-stark-dft = { path = "../lib-q-stark-dft" }
lib-q-stark-field = { path = "../lib-q-stark-field" }
lib-q-stark-matrix = { path = "../lib-q-stark-matrix" }
lib-q-stark-rayon = { path = "../lib-q-stark-rayon" }
lib-q-stark-util = { path = "../lib-q-stark-util" }

itertools = { version = "0.14.0", default-features = false, features = ["use_alloc"] }
postcard = { version = "1.1.3", default-features = false, features = ["alloc"] }
serde = { workspace = true, features = ["derive", "alloc"] }
subtle = { version = "2.6.1", default-features = false }
thiserror = { version = "2.0.17", default-features = false }
tracing = { version = "0.1.43", default-features = false, features = ["attributes"] }
zeroize = { workspace = true, features = ["derive"] }

[dev-dependencies]
lib-q-stark-challenger = { path = "../lib-q-stark-challenger" }
lib-q-stark-commit = { path = "../lib-q-stark-commit", features = ["test-utils"] }
lib-q-stark-dft = { path = "../lib-q-stark-dft" }
lib-q-stark-fri = { path = "../lib-q-stark-fri" }
lib-q-stark-matrix = { path = "../lib-q-stark-matrix" }
lib-q-stark-merkle = { path = "../lib-q-stark-merkle" }
lib-q-stark-mersenne31 = { path = "../lib-q-stark-mersenne31", features = ["test-utils"] }
lib-q-stark-shake256 = { path = "../lib-q-stark-shake256" }
lib-q-stark-symmetric = { path = "../lib-q-stark-symmetric" }

postcard = { version = "1.1.3", default-features = false, features = ["alloc"] }
rand = { workspace = true, features = ["small_rng"] }

[features]
parallel = ["lib-q-stark-rayon/parallel"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }
