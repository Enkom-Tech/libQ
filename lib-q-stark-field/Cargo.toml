[package]
name = "lib-q-stark-field"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "A modular framework for finite fields, including support for generic binomial extensions, SIMD-packed field arithmetic."
license.workspace = true
repository.workspace = true
readme.workspace = true
# Integration tests using `Mersenne31` live in `lib-q-stark-mersenne31` (published later; avoids dev-dep on publish).
exclude = ["/tests"]

[dependencies]
lib-q-stark-rayon = { path = "../lib-q-stark-rayon", version = "0.0.4" }
lib-q-stark-util = { path = "../lib-q-stark-util", version = "0.0.4" }

itertools = { workspace = true }
num-bigint = { workspace = true }
pastey = { workspace = true }
rand = { workspace = true, default-features = false }
serde = { workspace = true, features = ["derive"], default-features = false }
subtle = { workspace = true }
tracing = { workspace = true }
zeroize = { workspace = true, features = ["derive"], default-features = false }

[features]
default = ["alloc"]
std = ["alloc"]
alloc = []
no_std = []

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }
