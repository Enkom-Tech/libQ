[package]
name = "lib-q-core"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
readme.workspace = true
description = "Core types and traits for lib-Q post-quantum cryptography library"
keywords = ["cryptography", "post-quantum", "security", "core", "nist"]
categories = ["cryptography", "wasm"]

[dependencies]
# Core cryptographic dependencies - no_std compatible
getrandom = { version = "0.3.3", optional = true, default-features = false }
rand_core = { version = "0.9.3", default-features = false, features = ["os_rng"] }
rand = { version = "0.9.2", default-features = false, features = ["thread_rng"], optional = true }

# Note: lib-q-core should not depend on implementation crates to avoid cyclic dependencies
# Implementation crates depend on lib-q-core, and the main lib-q crate provides concrete implementations

# Zeroize for secure memory clearing
zeroize = { version = "1.8.1", features = ["derive"], default-features = false }

# Serde for serialization (optional)
serde = { version = "1.0.219", optional = true, features = ["derive"], default-features = false }

# WASM bindings
wasm-bindgen = { version = "0.2.100", optional = true, features = ["serde-serialize"] }
js-sys = { version = "0.3.77", optional = true }
serde-wasm-bindgen = { version = "0.6.5", optional = true }
serde_json = { version = "1.0.143", optional = true }

# Lazy static for global registry
lazy_static = "1.5.0"

[features]
default = ["std"]
std = ["getrandom", "alloc", "rand"]
alloc = []
no_std = []
# Random number generation - requires platform-specific configuration for no_std
# In no_std environments, applications must provide custom entropy sources
getrandom = ["dep:getrandom"]
rand = ["dep:rand"]

# Note: Feature flags for algorithm implementations are defined in the main lib-q crate
# lib-q-core only provides the foundational types and traits

# Hash function support (for conditional compilation)
hash = []

# Serialization features
serde = ["dep:serde"]

# WASM support
wasm = ["wasm-bindgen", "js-sys", "serde", "serde-wasm-bindgen", "serde_json", "wasm_getrandom", "alloc"]

# WASM-specific getrandom configuration
wasm_getrandom = ["getrandom", "getrandom/wasm_js"]

# Algorithm feature flags (for conditional compilation in WASM utils)
ml-kem = []
ml-dsa = []
fn-dsa = []
slh-dsa = []
saturnin = []
dawn = []

# Security validation features
relaxed_entropy_validation = []

[lib]
name = "lib_q_core"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[package.metadata.wasm-pack.profile.release]
# Enable bulk memory operations to fix wasm-validator errors
wasm-opt = ["-O", "--enable-bulk-memory"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
    'cfg(simd128)',
    'cfg(simd256)',
    'cfg(aarch64)',
    'cfg(x86_64)',
] }

