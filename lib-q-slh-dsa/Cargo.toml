[package]
name = "lib-q-slh-dsa"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
readme.workspace = true
description = "SLH-DSA (SPHINCS+) implementation for lib-Q"
keywords = ["cryptography", "post-quantum", "signatures", "slh-dsa", "sphincs"]
categories = ["cryptography"]
exclude = ["tests"]

[dependencies]
hybrid-array = { version = "0.4", features = ["extra-sizes"] }
typenum = { version = "1.17", features = ["const-generics"] }
lib-q-sha3 = { path = "../lib-q-sha3", default-features = false }
zerocopy = { version = "0.8", features = ["derive"] }
rand_core = { version = "0.9" }
signature = { version = "3.0.0-rc.4", features = ["rand_core"] }
hmac = "0.13.0-rc.1"
sha2 = { version = "0.11.0-rc.2", default-features = false }
digest = "0.11.0-rc.2"
pkcs8 = { version = "0.11.0-rc.6", default-features = false }
const-oid = { version = "0.10.1", features = ["db"] }
zeroize = { version = "1.8.1", optional = true, default-features = false }

[dev-dependencies]
hex-literal = "1.0.0"
hex = { version = "0.4.3", features = ["serde"] }
num-bigint = "0.4.6"
quickcheck = "1.0.3"
quickcheck_macros = "1.1.0"
proptest = "1.7.0"
criterion = "0.7"
aes = "0.9.0-rc.1"
cipher = "0.5.0-rc.1"
ctr = "0.10.0-rc.1"
rand_core = "0.9.3"
paste = "1.0.15"
rand = "0.9.2"
serde_json = "1.0.145"
serde = { version = "1.0.225", features = ["derive"] }
pkcs8 = { version = "0.11.0-rc.6", features = ["pem"] }

[lib]
bench = false

[[bench]]
name = "sign_verify"
harness = false

[[bench]]
name = "lib_q_benchmarks"
harness = false

[features]
default = ["alloc", "pkcs8/alloc"]
alloc = []
std = ["alloc"]
zeroize = ["dep:zeroize", "hybrid-array/zeroize"]
