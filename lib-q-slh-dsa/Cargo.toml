[package]
name = "lib-q-slh-dsa"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
readme.workspace = true
description = "SLH-DSA (SPHINCS+) implementation for lib-Q"
keywords = ["cryptography", "post-quantum", "signatures", "slh-dsa", "sphincs"]
categories = ["cryptography"]
exclude = ["tests"]

[dependencies]
hybrid-array = { workspace = true, features = ["extra-sizes"] }
typenum = { version = "1.20.1", features = ["const-generics"] }
lib-q-core = { path = "../lib-q-core", version = "0.0.5", features = ["alloc"] }
lib-q-sha3 = { path = "../lib-q-sha3", version = "0.0.5", default-features = false }
lib-q-random = { path = "../lib-q-random", version = "0.0.5", optional = true, default-features = false, features = ["signature"] }
rand_core = { workspace = true }
signature = { version = "3.0.0", features = ["rand_core"] }
hmac = "0.13.0"
sha2 = { workspace = true, default-features = false }
digest = { workspace = true }
pkcs8 = { version = "0.11.0", default-features = false, features = ["alloc"] }
const-oid = { version = "0.10.2", features = ["db"] }
zeroize = { workspace = true, default-features = false, features = ["alloc"] }
getrandom = { workspace = true, optional = true, default-features = false }
wasm-bindgen = { workspace = true, optional = true, features = ["serde-serialize"] }
js-sys = { workspace = true, optional = true }
serde = { workspace = true, optional = true, default-features = false, features = ["derive"] }
serde-wasm-bindgen = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true, default-features = false, features = ["alloc"] }
hex = { workspace = true, optional = true }

[target.'cfg(all(target_arch = "wasm32", target_os = "unknown"))'.dependencies]
getrandom = { workspace = true, default-features = false, features = ["wasm_js"] }

[dev-dependencies]
wasm-bindgen-test = { workspace = true }
hex-literal = { workspace = true }
pastey = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
criterion = { workspace = true }
hex = { workspace = true, features = ["serde"] }
lib-q-random = { path = "../lib-q-random", version = "0.0.5", features = ["std", "signature"] }
num-bigint = { workspace = true }
quickcheck = "1.1.0"
quickcheck_macros = "1.2.0"
proptest = { workspace = true }
aes = { workspace = true }
cipher = "0.5.2"
ctr = "0.10.1"
serde_json = { workspace = true }
serde = { workspace = true, features = ["derive"] }
pkcs8 = { version = "0.11.0", features = ["pem"] }

[lib]
bench = false
# wasm-pack requires `cdylib` for wasm32; `rlib` remains for Rust consumers. Transitive `no_std` uses explicit `lib-q-random` features (not `lib-q-random/no_std`) so firmware can supply its own `#[panic_handler]`.
crate-type = ["cdylib", "rlib"]

[[bench]]
name = "sign_verify"
harness = false

[[bench]]
name = "lib_q_benchmarks"
harness = false

[features]
default = ["alloc", "pkcs8/alloc", "std"]
alloc = []
std = [
    "alloc",
    "dep:lib-q-random",
    "lib-q-random/std",
    "lib-q-random/secure",
    "lib-q-random/zeroize",
]
no_std = [
    "getrandom",
    "alloc",
    "dep:lib-q-random",
    "lib-q-random/getrandom",
    "lib-q-random/alloc",
    "lib-q-random/zeroize",
]
test = []
# Expand `test_parameter_sets!`, ACVP keygen projection, and integration KATs to all 12 FIPS parameter sets and slow `*s` vectors (slow). Default smoke uses Shake128f + Sha2_128f only and skips `*s` ACVP groups.
all-parameter-set-tests = []
wasm = [
    "dep:wasm-bindgen",
    "dep:js-sys",
    "serde",
    "dep:serde-wasm-bindgen",
    "dep:serde_json",
    "dep:hex",
    "lib-q-core/wasm",
    "alloc",
    "std",
]

[[test]]
name = "wasm_smoke"
path = "tests/wasm_smoke.rs"
required-features = ["wasm"]

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-Oz", "--enable-bulk-memory"]
