[package]
name = "lib-q-threshold-kem-lattice"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
readme = "README.md"
description = "PROVISIONAL post-quantum lattice threshold KEM (dual-Regev over a BDLOP-committed key; dealerless keygen via lib-q-dkg; pre-standard)"
keywords = ["cryptography", "post-quantum", "lattice", "threshold", "kem"]
categories = ["cryptography", "wasm"]

[package.metadata.cargo-machete]
ignored = [
    # wasm-only / target-gated dependencies, not seen by the default host build.
    "getrandom",
    "lib-q-random",
]

[dependencies]
lib-q-dkg = { path = "../lib-q-dkg", version = "0.0.8", default-features = false }
lib-q-sha3 = { path = "../lib-q-sha3", version = "0.0.8", default-features = false, features = ["alloc"] }
zeroize = { workspace = true, default-features = false, features = ["alloc"] }
rand_core = { workspace = true }
# wasm-only optional dependencies (pulled in by the `wasm` feature).
lib-q-core = { path = "../lib-q-core", version = "0.0.8", optional = true, default-features = false }
lib-q-random = { path = "../lib-q-random", version = "0.0.8", optional = true, default-features = false, features = ["std"] }
wasm-bindgen = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true, features = ["std"] }
serde-wasm-bindgen = { workspace = true, optional = true }
getrandom = { workspace = true, optional = true, default-features = false }

[target.'cfg(all(target_arch = "wasm32", target_os = "unknown"))'.dependencies]
getrandom = { workspace = true, default-features = false, features = ["wasm_js"] }

[dev-dependencies]
lib-q-random = { path = "../lib-q-random", version = "0.0.8", default-features = false, features = ["std"] }
serde_json = { workspace = true, features = ["std"] }
wasm-bindgen-test = { workspace = true }
hex = { workspace = true }

[features]
default = ["std", "random"]
std = ["lib-q-dkg/std"]
random = ["lib-q-dkg/random"]
wasm = [
    "wasm-bindgen",
    "std",
    "random",
    "dep:serde_json",
    "dep:serde-wasm-bindgen",
    "dep:lib-q-core",
    "lib-q-core/std",
    "lib-q-core/wasm",
    "dep:lib-q-random",
    "lib-q-random/wasm",
    "dep:getrandom",
]
getrandom = ["dep:getrandom"]

[lib]
name = "lib_q_threshold_kem_lattice"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-Oz", "--enable-bulk-memory"]

[[test]]
name = "wasm_smoke"
path = "tests/wasm_smoke.rs"
required-features = ["wasm", "random"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(feature, values("std", "random", "wasm", "getrandom"))',
] }
