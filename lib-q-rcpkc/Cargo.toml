[package]
name = "lib-q-rcpkc"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true
description = "RCPKC Hybrid Cryptographic Scheme for lib-Q"
keywords = ["cryptography", "post-quantum", "hybrid", "rcpkc", "defense-in-depth"]
categories = ["cryptography", "wasm"]

[dependencies]
lib-q-core = { path = "../lib-q-core", features = ["alloc"] }
zeroize = { version = "1.8.1", default-features = false }

# Rand dependencies for key generation
rand = "0.9.2"
rand_core = "0.9.3"

# WASM bindings
wasm-bindgen = { version = "0.2.101", optional = true }

[dev-dependencies]
rand = "0.9.2"

[features]
default = ["alloc", "std"]
std = ["alloc"]
alloc = []

# Enable WASM support
wasm = [
    "wasm-bindgen",
    "std",
    "lib-q-core/wasm",
]

[lib]
name = "lib_q_rcpkc"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
