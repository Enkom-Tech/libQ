[package]
name = "lib-q-stark-merkle"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "A Merkle tree implementation providing commitment scheme functionality for cryptographic proofs."
license.workspace = true
repository.workspace = true
readme.workspace = true

[dependencies]
lib-q-poseidon = { path = "../lib-q-poseidon", version = "0.0.4", optional = true }
lib-q-stark-commit = { path = "../lib-q-stark-commit", version = "0.0.4" }
lib-q-stark-field = { path = "../lib-q-stark-field", version = "0.0.4" }
lib-q-stark-matrix = { path = "../lib-q-stark-matrix", version = "0.0.4" }
lib-q-stark-rayon = { path = "../lib-q-stark-rayon", version = "0.0.4" }
lib-q-stark-symmetric = { path = "../lib-q-stark-symmetric", version = "0.0.4" }
lib-q-stark-util = { path = "../lib-q-stark-util", version = "0.0.4" }

itertools = { workspace = true }
lib-q-random = { path = "../lib-q-random", version = "0.0.4", default-features = false, features = ["std"] }
rand = { workspace = true, default-features = false }
serde = { workspace = true, features = ["alloc"], default-features = false }
thiserror = { workspace = true }
tracing = { workspace = true }

[features]
default = ["alloc"]
std = ["alloc"]
alloc = []
no_std = []
lib-q-poseidon = ["dep:lib-q-poseidon"]
poseidon = ["lib-q-poseidon", "alloc"]

[dev-dependencies]
lib-q-stark-mds = { path = "../lib-q-stark-mds", version = "0.0.4" }
lib-q-stark-mersenne31 = { path = "../lib-q-stark-mersenne31", version = "0.0.4", features = ["test-utils"] }
lib-q-stark-shake256 = { path = "../lib-q-stark-shake256", version = "0.0.4" }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
criterion = { workspace = true }

[lib]
bench = false

[[bench]]
name = "merkle_tree"
harness = false

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }
