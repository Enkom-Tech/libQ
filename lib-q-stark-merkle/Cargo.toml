[package]
name = "lib-q-stark-merkle"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "A Merkle tree implementation providing commitment scheme functionality for cryptographic proofs."
license.workspace = true
repository.workspace = true
readme.workspace = true

[dependencies]
lib-q-poseidon = { path = "../lib-q-poseidon", optional = true }
lib-q-stark-commit = { path = "../lib-q-stark-commit" }
lib-q-stark-field = { path = "../lib-q-stark-field" }
lib-q-stark-matrix = { path = "../lib-q-stark-matrix" }
lib-q-stark-rayon = { path = "../lib-q-stark-rayon" }
lib-q-stark-symmetric = { path = "../lib-q-stark-symmetric" }
lib-q-stark-util = { path = "../lib-q-stark-util" }

itertools = { workspace = true }
lib-q-random = { path = "../lib-q-random", default-features = false }
rand = { workspace = true, default-features = false }
serde = { workspace = true, features = ["alloc"], default-features = false }
thiserror = { workspace = true }
tracing = { workspace = true }

[features]
default = ["alloc"]
std = ["alloc"]
alloc = []
no_std = []
poseidon = ["dep:lib-q-poseidon", "alloc"]

[dev-dependencies]
lib-q-stark-mds = { path = "../lib-q-stark-mds" }
lib-q-stark-mersenne31 = { path = "../lib-q-stark-mersenne31", features = ["test-utils"] }
lib-q-stark-shake256 = { path = "../lib-q-stark-shake256" }

criterion = { workspace = true }

[[bench]]
name = "merkle_tree"
harness = false

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }
