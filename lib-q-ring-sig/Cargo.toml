[package]
name = "lib-q-ring-sig"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
readme = "README.md"
description = "Federation-style ring openings over Ajtai commitments (DualRing-LB CCS 2021 aggregated verify)"
keywords = ["cryptography", "post-quantum", "lattice", "ring-signature", "no-std"]
categories = ["cryptography", "no-std"]

[dependencies]
# With `default-features = false`, the `std` feature enables `lib-q-core/std` so the crate root can omit
# `#![no_std]` under default features: native `cdylib`+`alloc` otherwise needs a global allocator and
# `#[panic_handler]` (see `lib-q-prf`).
lib-q-core = { path = "../lib-q-core", version = "0.0.4", default-features = false }
lib-q-lattice-zkp = { path = "../lib-q-lattice-zkp", version = "0.0.4", default-features = false, features = ["std"] }
lib-q-ring = { path = "../lib-q-ring", version = "0.0.4", default-features = false, features = ["std"] }
lib-q-sha3 = { path = "../lib-q-sha3", version = "0.0.4", default-features = false }
# Default features must stay enabled: `lib-q-prf` is built as `cdylib`+`rlib`; a no-std build
# without `std`'s allocator/panic runtime fails to link that cdylib on native targets.
lib-q-prf = { path = "../lib-q-prf", version = "0.0.4", optional = true }
crypto-bigint = { workspace = true, optional = true, default-features = false, features = ["zeroize"] }
subtle = { workspace = true, default-features = false }
rand_core = { workspace = true }
wasm-bindgen = { workspace = true, optional = true, features = ["serde-serialize"] }
js-sys = { workspace = true, optional = true }
serde = { workspace = true, optional = true, default-features = false, features = ["derive"] }
serde_json = { workspace = true, optional = true, default-features = false, features = ["alloc"] }
serde-wasm-bindgen = { workspace = true, optional = true }
hex = { workspace = true, optional = true }
lib-q-random = { path = "../lib-q-random", version = "0.0.4", optional = true, features = ["std", "getrandom"] }

[dev-dependencies]
rand_chacha = { workspace = true, features = ["std"] }
wasm-bindgen-test = { workspace = true }

[[test]]
name = "wasm_smoke"
path = "tests/wasm_smoke.rs"
required-features = ["wasm"]

[features]
default = ["std"]
std = [
    "lib-q-core/std",
    "lib-q-lattice-zkp/std",
    "lib-q-ring/std",
]
lib-q-prf = ["dep:lib-q-prf"]
crypto-bigint = ["dep:crypto-bigint"]
pilot-insecure-prf-transcript = ["lib-q-prf", "crypto-bigint"]
federation-opening = []
wasm = [
    "std",
    "dep:wasm-bindgen",
    "dep:js-sys",
    "serde",
    "dep:serde_json",
    "dep:serde-wasm-bindgen",
    "dep:hex",
    "dep:lib-q-random",
    "lib-q-core/wasm",
]

[lib]
# wasm-pack requires `cdylib` for wasm32; `rlib` remains for Rust consumers. Default `std` avoids
# native `cdylib`+`#![no_std]`+`alloc` needing a global allocator and `#[panic_handler]` under unwind.
# Use `--no-default-features` only with an embedded/firmware setup that supplies those (see `lib-q-prf`).
crate-type = ["cdylib", "rlib"]

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-Oz", "--enable-bulk-memory"]

[[test]]
name = "pilot_insecure_prf_transcript_tests"
path = "tests/pilot_insecure_prf_transcript_tests.rs"
required-features = ["pilot-insecure-prf-transcript"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(ring_sig_docs)',
    'cfg(feature, values("pilot-insecure-prf-transcript", "federation-opening", "std", "wasm"))',
] }
