[package]
name = "lib-q-stark-dft"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "A collection of discrete Fourier transform (DFT) implementations for finite fields."
license.workspace = true
repository.workspace = true
readme.workspace = true

[dependencies]
lib-q-stark-field = { path = "../lib-q-stark-field" }
lib-q-stark-matrix = { path = "../lib-q-stark-matrix" }
lib-q-stark-rayon = { path = "../lib-q-stark-rayon" }
lib-q-stark-util = { path = "../lib-q-stark-util" }

itertools = { workspace = true }
spin = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
lib-q-stark-mersenne31 = { path = "../lib-q-stark-mersenne31" }
lib-q-stark-monty31 = { path = "../lib-q-stark-monty31" }

criterion = { workspace = true }
rand = { workspace = true, default-features = false, features = ["std"] }

[features]
default = ["alloc"]
std = ["alloc"]
alloc = []
no_std = []
parallel = ["lib-q-stark-rayon/parallel"]

[[bench]]
name = "fft"
harness = false

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }
