[package]
name = "lib-q-stark-dft"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "A collection of discrete Fourier transform (DFT) implementations for finite fields."
license.workspace = true
repository.workspace = true
readme.workspace = true

[dependencies]
lib-q-stark-field = { path = "../lib-q-stark-field", version = "0.0.7" }
lib-q-stark-matrix = { path = "../lib-q-stark-matrix", version = "0.0.7" }
lib-q-stark-rayon = { path = "../lib-q-stark-rayon", version = "0.0.7" }
lib-q-stark-util = { path = "../lib-q-stark-util", version = "0.0.7" }

itertools = { workspace = true }
spin = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
rand = { workspace = true, default-features = false, features = ["std"] }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
criterion = { workspace = true }

[features]
default = ["alloc"]
std = ["alloc"]
alloc = []
no_std = []
parallel = ["lib-q-stark-rayon/parallel"]

[lib]
bench = false

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }
