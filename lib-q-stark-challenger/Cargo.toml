[package]
name = "lib-q-stark-challenger"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "A Fiat–Shamir transcript and challenger framework used to derive random challenges in proof systems."
license.workspace = true
repository.workspace = true
readme.workspace = true

[dependencies]
lib-q-stark-field = { path = "../lib-q-stark-field" }
lib-q-stark-rayon = { path = "../lib-q-stark-rayon" }
lib-q-stark-shake256 = { path = "../lib-q-stark-shake256" }
lib-q-stark-shake128 = { path = "../lib-q-stark-shake128" }
lib-q-stark-sha3-256 = { path = "../lib-q-stark-sha3-256" }
lib-q-stark-symmetric = { path = "../lib-q-stark-symmetric" }
lib-q-stark-util = { path = "../lib-q-stark-util" }

tracing = { version = "0.1.43", default-features = false, features = ["attributes"] }
zeroize = { workspace = true, features = ["derive"], default-features = false }

[features]
default = ["alloc"]
std = ["alloc"]
alloc = []
no_std = []

[dev-dependencies]
lib-q-stark-mersenne31 = { path = "../lib-q-stark-mersenne31" }
criterion = { workspace = true }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }
