[package]
name = "lib-q-fn-dsa-alg"
version = "0.0.6"
authors.workspace = true
categories.workspace = true
description = "FN-DSA algorithm facade (lib-Q; not the crates.io `fn-dsa` package by pornin)"
edition.workspace = true
keywords.workspace = true
license.workspace = true
readme.workspace = true
repository.workspace = true
rust-version.workspace = true
autobenches = false

[lib]
name = "fn_dsa"
bench = false

[dependencies]
lib-q-fn-dsa-comm = { version = "0.0.6", path = "../fn-dsa-comm" }
lib-q-fn-dsa-kgen = { version = "0.0.6", path = "../fn-dsa-kgen" }
lib-q-fn-dsa-sign = { version = "0.0.6", path = "../fn-dsa-sign" }
lib-q-fn-dsa-vrfy = { version = "0.0.6", path = "../fn-dsa-vrfy" }

[dev-dependencies]
hex = { workspace = true }

[features]
default = []
no_avx2 = ["lib-q-fn-dsa-comm/no_avx2", "lib-q-fn-dsa-kgen/no_avx2", "lib-q-fn-dsa-sign/no_avx2", "lib-q-fn-dsa-vrfy/no_avx2"]
shake256x4 = ["lib-q-fn-dsa-comm/shake256x4", "lib-q-fn-dsa-kgen/shake256x4", "lib-q-fn-dsa-sign/shake256x4"]

[[bench]]
name = "keygen"
path = "benches/keygen.rs"
harness = false

[[bench]]
name = "sign"
path = "benches/sign.rs"
harness = false

[[bench]]
name = "verify"
path = "benches/verify.rs"
harness = false
