[package]
name = "lib-q-threshold-sig"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
readme = "README.md"
description = "PROVISIONAL SHAKE256-based threshold signature crate (FROST-like, pre-standard)"
keywords = ["cryptography", "post-quantum", "threshold", "signature", "shake256"]
categories = ["cryptography", "wasm"]


[package.metadata.cargo-machete]
ignored = [
    "getrandom",
    "serde",
]
[dependencies]
lib-q-core = { path = "../lib-q-core", version = "0.0.9", optional = true, default-features = false }
lib-q-sha3 = { path = "../lib-q-sha3", version = "0.0.9", default-features = false, features = ["alloc"] }
lib-q-ring = { path = "../lib-q-ring", version = "0.0.9", default-features = false, features = ["alloc"] }
lib-q-random = { path = "../lib-q-random", version = "0.0.9", default-features = false, features = ["std"] }
zeroize = { workspace = true, default-features = false, features = ["alloc"] }
subtle = { workspace = true, default-features = false }
rand_core = { workspace = true }
wasm-bindgen = { workspace = true, optional = true }
js-sys = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true, features = ["std"] }
serde-wasm-bindgen = { workspace = true, optional = true }
getrandom = { workspace = true, optional = true, default-features = false }

[target.'cfg(all(target_arch = "wasm32", target_os = "unknown"))'.dependencies]
getrandom = { workspace = true, default-features = false, features = ["wasm_js"] }

[dev-dependencies]
hex = { workspace = true }
serde = { workspace = true, features = ["derive", "std"] }
serde_json = { workspace = true, features = ["std"] }
wasm-bindgen-test = { workspace = true }

[features]
default = ["std", "random"]
std = []
random = []
wasm = [
    "wasm-bindgen",
    "js-sys",
    "std",
    "random",
    "dep:serde_json",
    "dep:serde-wasm-bindgen",
    "dep:lib-q-core",
    "lib-q-core/std",
    "lib-q-core/wasm",
    "lib-q-random/wasm",
    "dep:getrandom",
]
getrandom = ["dep:getrandom"]

[lib]
name = "lib_q_threshold_sig"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-Oz", "--enable-bulk-memory"]

[[test]]
name = "wasm_smoke"
path = "tests/wasm_smoke.rs"
required-features = ["wasm", "random"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(feature, values("std", "random", "wasm", "getrandom"))',
] }
