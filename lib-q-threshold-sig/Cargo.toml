[package]
name = "lib-q-threshold-sig"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
readme = "README.md"
description = "PROVISIONAL SHAKE256-based threshold signature crate (FROST-like, pre-standard)"
keywords = ["cryptography", "post-quantum", "threshold", "signature", "shake256"]
categories = ["cryptography"]

[dependencies]
lib-q-sha3 = { path = "../lib-q-sha3", version = "0.0.6", default-features = false, features = ["alloc"] }
lib-q-ring = { path = "../lib-q-ring", version = "0.0.6", default-features = false, features = ["alloc"] }
lib-q-random = { path = "../lib-q-random", version = "0.0.6", default-features = false, features = ["std"] }
zeroize = { workspace = true, default-features = false, features = ["alloc"] }
subtle = { workspace = true, default-features = false }
rand_core = { workspace = true }

[dev-dependencies]
hex = { workspace = true }
serde = { workspace = true, features = ["derive", "std"] }
serde_json = { workspace = true, features = ["std"] }

[features]
default = ["std", "random"]
std = []
random = []

[lib]
name = "lib_q_threshold_sig"
path = "src/lib.rs"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(feature, values("std", "random"))'] }
