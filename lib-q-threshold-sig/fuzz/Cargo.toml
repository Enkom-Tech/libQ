[package]
name = "lib-q-threshold-sig-fuzz"
version = "0.0.9"
edition = "2024"
rust-version = "1.96.0"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
lib-q-threshold-sig = { path = "..", default-features = false, features = ["std", "random"] }
lib-q-random = { path = "../../lib-q-random", version = "0.0.9", default-features = false, features = ["std"] }
libfuzzer-sys = "0.4.12"

[[bin]]
name = "wire_decode"
path = "fuzz_targets/wire_decode.rs"
test = false
doc = false
bench = false

[[bin]]
name = "identify_abort"
path = "fuzz_targets/identify_abort.rs"
test = false
doc = false
bench = false

[[bin]]
name = "threshold_sig_wire_decode"
path = "fuzz_targets/threshold_sig_wire_decode.rs"
test = false
doc = false
bench = false

[[bin]]
name = "threshold_sig_identify_abort"
path = "fuzz_targets/threshold_sig_identify_abort.rs"
test = false
doc = false
bench = false

[workspace]
members = ["."]
resolver = "3"
