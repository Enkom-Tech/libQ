# yaml-language-server: $schema=../../schemas/github-action.json
name: Test Saturnin
description: Run Saturnin tests with security validation and benchmarking
inputs:
  working-directory:
    description: Working directory for saturnin crate
    default: lib-q-saturnin
    required: true
  features:
    description: Features to enable for testing
    default: "aead,aead-short,block-cipher,hash,stream,alloc"
    required: false
  rust-version:
    description: Rust toolchain version to use
    default: "stable"
    required: false
  run-benchmarks:
    description: Whether to run benchmarks (requires nightly)
    default: "false"
    required: false
  test-algorithms:
    description: Specific algorithms to test
    default: "aead,aead-short,block-cipher,hash,stream"
    required: false

runs:
  using: composite
  steps:
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-version }}
        components: rustfmt, clippy, rust-src
    
    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-saturnin-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-saturnin-

    # Same E0460 class as rust-test: stale companion rlibs / merged doctests vs incremental.
    - name: Nuke stale release-ci tree (E0460/E0463)
      shell: bash
      run: |
        ROOT="${GITHUB_WORKSPACE:-$(git rev-parse --show-toplevel)}"
        rm -rf "${ROOT}/target/release-ci"

    - name: Disable Cargo incremental (E0460 guard)
      shell: bash
      run: echo "CARGO_INCREMENTAL=0" >> "$GITHUB_ENV"
    
    - name: Security audit
      shell: bash
      run: |
        echo "Running security audit for Saturnin..."
        cargo install cargo-audit --locked
        cargo audit --deny warnings
        echo "Security audit completed successfully"
    
    - name: Check formatting
      shell: bash
      run: |
        echo "Checking code formatting..."
        cd ${{ inputs.working-directory }}
        cargo fmt --all -- --check
        echo "Formatting check completed"
    
    - name: Clippy linting
      shell: bash
      run: |
        echo "Running Clippy linting..."
        cd ${{ inputs.working-directory }}
        if [ -n "${{ inputs.features }}" ]; then
          cargo clippy --all-targets --features "${{ inputs.features }}" -- -D warnings
        else
          cargo clippy --all-targets -- -D warnings
        fi
        echo "Clippy linting completed"
    
    - name: Build with no default features
      shell: bash
      run: |
        echo "Building with no default features..."
        cd ${{ inputs.working-directory }}
        WORKING_DIR="${{ inputs.working-directory }}"
        if [[ "$WORKING_DIR" == "lib-q-saturnin" ]]; then
          echo "Building lib-q-saturnin with no_std support"
          # Saturnin supports no_std with alloc feature
          cargo build --no-default-features --features "alloc"
        else
          cargo build --no-default-features
        fi
        echo "Build completed"
    
    - name: Build with all features
      shell: bash
      run: |
        echo "Building with features: ${{ inputs.features }}"
        cd ${{ inputs.working-directory }}
        if [ -n "${{ inputs.features }}" ]; then
          cargo build --features "${{ inputs.features }}"
        else
          cargo build
        fi
        echo "Build with features completed"
    
    - name: Run tests (minimal / harness-friendly)
      shell: bash
      run: |
        echo "Running tests (Saturnin: default features + alloc,std for harness; others: --no-default-features)..."
        cd ${{ inputs.working-directory }}
        WORKING_DIR="${{ inputs.working-directory }}"
        if [[ "$WORKING_DIR" == "lib-q-saturnin" ]]; then
          echo "lib-q-saturnin: doctest + lib tests need alloc; std satisfies the default test harness"
          # Narrow no-default-feature coverage is done locally via:
          #   cargo test -p lib-q-saturnin --no-default-features --features stream,alloc
          # The build step above still verifies `cargo build --no-default-features --features alloc`.
          cargo test --features "alloc,std"
        else
          cargo test --no-default-features
        fi
        echo "Tests completed"
    
    - name: Run tests with all features
      shell: bash
      run: |
        echo "Running tests with features: ${{ inputs.features }}"
        cd ${{ inputs.working-directory }}
        if [ -n "${{ inputs.features }}" ]; then
          cargo test --features "${{ inputs.features }}"
        else
          cargo test
        fi
        echo "Tests with features completed"
    
    - name: Run Saturnin KAT tests
      shell: bash
      run: |
        echo "Running Saturnin Known Answer Tests..."
        cd ${{ inputs.working-directory }}
        cargo test --features "${{ inputs.features }}" --test kat_tests
        echo "Saturnin KAT tests completed"
    
    - name: Run Saturnin integration tests
      shell: bash
      run: |
        echo "Running Saturnin integration tests..."
        cd ${{ inputs.working-directory }}
        cargo test --features "${{ inputs.features }}" --test integration_tests
        echo "Saturnin integration tests completed"
    
    - name: Run benchmarks (nightly only)
      if: inputs.run-benchmarks == 'true' && inputs.rust-version == 'nightly'
      shell: bash
      run: |
        echo "Running Saturnin benchmarks..."
        rm -rf target/release
        cd ${{ inputs.working-directory }}
        cargo bench --features "${{ inputs.features }}"
        echo "Saturnin benchmarks completed"
    
    - name: Cross-compilation test (ARM64)
      shell: bash
      run: |
        echo "Testing ARM64 cross-compilation..."
        cd ${{ inputs.working-directory }}
        rustup target add aarch64-unknown-linux-gnu
        if [ -n "${{ inputs.features }}" ]; then
          cargo check --target aarch64-unknown-linux-gnu --features "${{ inputs.features }}"
        else
          cargo check --target aarch64-unknown-linux-gnu
        fi
        echo "Cross-compilation test completed"
    
    - name: WASM compilation test
      shell: bash
      env:
        # Ensure getrandom WASM backend is properly configured with panic=abort
        CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUSTFLAGS: '--cfg getrandom_backend="wasm_js" -C panic=abort'
      run: |
        echo "Testing WASM compilation..."
        cd ${{ inputs.working-directory }}
        rustup target add wasm32-unknown-unknown
        WASM_FEATURES="wasm"
        if [ -n "${{ inputs.features }}" ]; then
          WASM_FEATURES="${{ inputs.features }},wasm"
        fi
        cargo check --target wasm32-unknown-unknown --features "$WASM_FEATURES" --lib
        echo "WASM compilation test completed"
    
    - name: WASM all-features compilation test
      shell: bash
      env:
        CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUSTFLAGS: '--cfg getrandom_backend="wasm_js" -C panic=abort'
      run: |
        echo "Testing WASM compilation with all features..."
        cd ${{ inputs.working-directory }}
        rustup target add wasm32-unknown-unknown
        cargo check --target wasm32-unknown-unknown --all-features --features wasm --lib
        echo "WASM all-features compilation test completed"
    
    - name: Constant-time operation verification
      shell: bash
      run: |
        echo "Verifying constant-time operations..."
        cd ${{ inputs.working-directory }}
        cargo test --test constant_time --features "${{ inputs.features }}" -p lib-q-saturnin
        echo "Constant-time verification completed"
