# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Test SHA3
description: Run SHA3 tests with security validation and comprehensive feature testing
inputs:
  working-directory:
    description: Working directory for SHA3 testing
    default: lib-q-hash
    required: true
  features:
    description: Features to enable for testing
    default: "alloc,oid"
    required: false
  rust-version:
    description: Rust toolchain version to use
    default: "stable"
    required: false
  test-algorithms:
    description: Specific algorithms to test
    default: "sha3-224,sha3-256,sha3-384,sha3-512,keccak224,keccak256,keccak384,keccak512,turboshake128,turboshake256"
    required: false
  run-benchmarks:
    description: Whether to run benchmarks (requires nightly)
    default: "false"
    required: false

runs:
  using: composite
  steps:
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-version }}
        components: rustfmt, clippy
    
    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-sha3-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-sha3-
    
    - name: Security audit
      shell: bash
      run: |
        echo "Running security audit for SHA3..."
        cargo install cargo-audit --locked
        cargo audit --deny warnings
        echo "Security audit completed successfully"
    
    - name: Check formatting
      shell: bash
      run: |
        echo "Checking code formatting..."
        cd ${{ inputs.working-directory }}
        cargo fmt --all -- --check
        echo "Formatting check completed"
    
    - name: Clippy linting
      shell: bash
      run: |
        echo "Running Clippy linting..."
        cd ${{ inputs.working-directory }}
        cargo clippy --all-targets --all-features -- -D warnings
        echo "Clippy linting completed"
    
    - name: Build with default features
      shell: bash
      run: |
        echo "Building with default features..."
        cd ${{ inputs.working-directory }}
        cargo build --features "${{ inputs.features }}"
        echo "Build completed"
    
    - name: Build with all features
      shell: bash
      run: |
        echo "Building with all features..."
        cd ${{ inputs.working-directory }}
        cargo build --all-features
        echo "Build with all features completed"
    
    - name: Run all tests
      shell: bash
      run: |
        echo "Running all tests..."
        cd ${{ inputs.working-directory }}
        cargo test --features "${{ inputs.features }}"
        echo "All tests completed"
    
    - name: Run algorithm-specific tests
      shell: bash
      run: |
        echo "Running algorithm-specific tests..."
        cd ${{ inputs.working-directory }}
        if [ -n "${{ inputs.test-algorithms }}" ] && [ "${{ inputs.test-algorithms }}" != "" ]; then
          # Split comma-separated algorithms and test each one
          IFS=',' read -ra ALGORITHMS <<< "${{ inputs.test-algorithms }}"
          for alg in "${ALGORITHMS[@]}"; do
            echo "Testing algorithm: $alg"
            cargo test --features "${{ inputs.features }}" --test "*$alg*" || true
          done
        else
          echo "No specific algorithms to test"
        fi
        echo "Algorithm-specific tests completed"
    
    - name: Test SHA3 crate (FIPS-202 + SP-800-185; Keccak *types* are in lib-q-keccak-digest)
      shell: bash
      run: |
        echo "Testing lib-q-sha3 (SHA-3 / SHAKE / cSHAKE / TurboSHAKE)..."
        cd ${{ inputs.working-directory }}
        cargo test -p lib-q-sha3 --features "${{ inputs.features }}"
        echo "lib-q-sha3 tests completed"
    
    - name: Constant-time operation verification
      shell: bash
      run: |
        echo "Verifying constant-time operations..."
        cd ${{ inputs.working-directory }}
        # Run specific tests that verify constant-time behavior
        cargo test --test constant_time --features "${{ inputs.features }}" -p lib-q-sha3
        echo "Constant-time verification completed"
    
    - name: Test Keccak digests (lib-q-keccak-digest)
      shell: bash
      run: |
        echo "Testing pre-FIPS Keccak digests (moved from lib-q-sha3)..."
        cd ${{ inputs.working-directory }}
        # KATs and integration tests for Keccak224–512 / Keccak256Full live in this crate
        cargo test -p lib-q-keccak-digest
        echo "lib-q-keccak-digest tests completed"
    
    - name: Test lib-q-hash (create_hash for SHA-3, Keccak, and other algorithms)
      shell: bash
      run: |
        echo "Testing lib-q-hash (provider + create_hash smoke)..."
        cd ${{ inputs.working-directory }}
        cargo test --features "${{ inputs.features }}" create_hash_smoke_all_variants
        echo "lib-q-hash create_hash tests completed"
    
    - name: Cross-compilation test (ARM64)
      shell: bash
      run: |
        echo "Testing ARM64 cross-compilation..."
        cd ${{ inputs.working-directory }}
        rustup target add aarch64-unknown-linux-gnu
        cargo check --target aarch64-unknown-linux-gnu --features "${{ inputs.features }}"
        echo "Cross-compilation test completed"
    
    - name: WASM compilation test
      shell: bash
      env:
        # Ensure getrandom WASM backend is properly configured with panic=abort
        CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUSTFLAGS: '--cfg getrandom_backend="wasm_js" -C panic=abort'
      run: |
        echo "Testing WASM compilation..."
        cd ${{ inputs.working-directory }}
        rustup target add wasm32-unknown-unknown
        cargo check --target wasm32-unknown-unknown --features "${{ inputs.features }}" --lib
        echo "WASM compilation test completed"
    
    - name: Feature powerset test
      shell: bash
      run: |
        echo "Testing feature combinations..."
        cd ${{ inputs.working-directory }}
        cargo install cargo-hack
        # Limit feature combinations to prevent timeouts
        # Note: --feature-powerset and --each-feature cannot be used together
        cargo hack test --feature-powerset --exclude-features default --skip asm
        echo "Feature powerset test completed"
        
    - name: Run benchmarks (nightly only)
      if: inputs.run-benchmarks == 'true' && inputs.rust-version == 'nightly'
      shell: bash
      run: |
        echo "Running SHA3 benchmarks..."
        rm -rf target/release
        cd ${{ inputs.working-directory }}
        cargo bench --features "nightly" --bench sha3 || echo "No SHA3 benchmarks found"
        echo "SHA3 benchmarks completed"
