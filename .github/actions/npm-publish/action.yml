# yaml-language-server: $schema=../../schemas/github-action.json
name: NPM Publish
description: Reusable action for publishing NPM packages
inputs:
  package-name:
    description: NPM package name
    required: true
  package-description:
    description: Package description
    required: true
  package-keywords:
    description: Comma-separated package keywords
    required: true
  working-directory:
    description: Working directory containing the package
    default: "pkg"
    required: false
  token:
    description: NPM token
    required: true
  version:
    description: Package version
    required: true
  dry-run:
    description: Whether to do a dry run
    default: "false"
    required: false
  crate-root:
    description: Path to the Rust crate root (directory containing Cargo.toml); used to resolve wasm-pack entry file names and README template
    default: ""
    required: false

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # npm 11.6.2+ fixes misleading E404 on publish (token + provenance / trusted publishing).
    - name: Upgrade npm CLI
      shell: bash
      run: npm install -g npm@11.6.2
    
    - name: Prepare NPM package
      shell: bash
      run: |
        echo "Preparing NPM package..."
        cd ${{ inputs.working-directory }}
        
        REPO_ROOT="${GITHUB_WORKSPACE}"
        CRATE_ROOT="${{ inputs.crate-root }}"
        STEM=""
        if [[ -n "$CRATE_ROOT" && -f "$REPO_ROOT/$CRATE_ROOT/Cargo.toml" ]]; then
          STEM=$(CRATE_TOML="$REPO_ROOT/$CRATE_ROOT/Cargo.toml" python3 -c "import os,tomllib;d=tomllib.load(open(os.environ['CRATE_TOML'],'rb'));lib=d.get('lib')or{};print(lib.get('name')or d['package']['name'].replace('-','_'))")
        fi
        export NPM_PUBLISH_STEM="$STEM"

        # wasm-pack dual-target builds write package.json under web/ and nodejs/, not pkg/ root.
        if [[ ! -f package.json ]]; then
          if [[ -f web/package.json ]]; then
            cp web/package.json package.json
          elif [[ -f nodejs/package.json ]]; then
            cp nodejs/package.json package.json
          else
            echo "::error::missing package.json in $(pwd) (expected wasm-pack pkg/, pkg/web, or pkg/nodejs)"
            exit 1
          fi
        fi
        rm -f web/.gitignore nodejs/.gitignore 2>/dev/null || true
        
        npm pkg set name="${{ inputs.package-name }}"
        npm pkg set version="${{ inputs.version }}"
        npm pkg set description="${{ inputs.package-description }}"
        npm pkg set type="module"
        
        export KEYWORDS_INPUT="${{ inputs.package-keywords }}"
        KEYWORDS_JSON=$(node -e "const keywords = process.env.KEYWORDS_INPUT.split(',').map(k => k.trim()).filter(k => k); console.log(JSON.stringify(keywords));")
        npm pkg set keywords="$KEYWORDS_JSON"
        
        npm pkg set author="lib-Q Contributors"
        npm pkg set license="Apache-2.0"
        npm pkg set repository.type="git"
        npm pkg set repository.url="https://github.com/Enkom-Tech/libQ.git"
        npm pkg set homepage="https://github.com/Enkom-Tech/libQ#readme"
        npm pkg set bugs.url="https://github.com/Enkom-Tech/libQ/issues"
        
        README_DST="README.md"
        if [[ -n "$CRATE_ROOT" && -f "$REPO_ROOT/$CRATE_ROOT/README.md" ]]; then
          cp "$REPO_ROOT/$CRATE_ROOT/README.md" "$README_DST"
        else
          sed 's/^        //' > "$README_DST" <<EOF
        # ${{ inputs.package-name }}

        ${{ inputs.package-description }}

        ## Install

        \`\`\`bash
        npm install ${{ inputs.package-name }}@${{ inputs.version }}
        \`\`\`

        ## Runtime targets

        When both **web** and **nodejs** wasm-pack outputs are published, \`package.json\` uses conditional \`exports\`: bundlers use \`browser\` / \`module\`; Node uses \`node\`.

        ## Content Security Policy (browser)

        WASM instantiation requires CSP rules compatible with your loader (often \`script-src\` including \`'wasm-unsafe-eval'\` or equivalent). See [wasm-security-model](https://github.com/Enkom-Tech/libQ/blob/main/docs/wasm-security-model.md).

        ## Security

        NIST-oriented post-quantum cryptography only; see [wasm-security-model](https://github.com/Enkom-Tech/libQ/blob/main/docs/wasm-security-model.md) for WASM linear memory, CSP, SRI, and timing notes.

        ## Types

        Shared TypeScript shapes: [\`@lib-q/types\`](https://www.npmjs.com/package/@lib-q/types).
        EOF
        fi
        
        node "$REPO_ROOT/scripts/npm-publish-annotate.mjs"
        
        if [[ -f integrity-manifest.json ]]; then
          echo "" >> "$README_DST"
          echo "## Subresource integrity (SHA-384)" >> "$README_DST"
          echo "Paths in \`integrity-manifest.json\` are relative to the package root (including \`web/\` and \`nodejs/\` when both ship)." >> "$README_DST"
        fi
        
        echo "NPM package prepared successfully"
    
    - name: Publish NPM package
      shell: bash
      env:
        NODE_AUTH_TOKEN: ${{ inputs.token }}
      run: |
        echo "Publishing NPM package..."
        cd ${{ inputs.working-directory }}

        publish_args=(--access public)
        publish_once() {
          npm publish "${publish_args[@]}" "$@"
        }
        
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          echo "Dry run mode - would publish ${{ inputs.package-name }}"
          publish_once --dry-run
        elif [ -n "$NODE_AUTH_TOKEN" ]; then
          log="$(mktemp)"
          echo "Publishing with NODE_AUTH_TOKEN"
          if publish_once 2>&1 | tee "$log"; then
            :
          elif grep -qE 'E404|ENEEDAUTH|401 Unauthorized' "$log"; then
            echo "Token publish failed; retrying with npm trusted publishing (OIDC)"
            unset NODE_AUTH_TOKEN
            if ! publish_once 2>&1 | tee "$log"; then
              echo "::error::npm publish failed for ${{ inputs.package-name }} after token and OIDC attempts."
              cat "$log"
              exit 1
            fi
          else
            cat "$log"
            exit 1
          fi
        else
          log="$(mktemp)"
          echo "Publishing with npm trusted publishing (OIDC)"
          if ! publish_once 2>&1 | tee "$log"; then
            echo "::error::npm publish failed for ${{ inputs.package-name }}. Configure npm Trusted Publishers for Enkom-Tech/libQ workflow cd.yml or set secrets.NPM_TOKEN with publish access to @lib-q/*."
            cat "$log"
            exit 1
          fi
        fi
        
        echo "Successfully published ${{ inputs.package-name }}"
