# yaml-language-server: $schema=../../schemas/github-action.json
name: Crate Publish
description: Reusable action for publishing Rust crates to crates.io
inputs:
  package:
    description: Package name to publish
    required: true
  token:
    description: Cargo registry token (prefer steps.<id>.outputs.token from rust-lang/crates-io-auth-action for Trusted Publishing)
    required: true
  working-directory:
    description: Working directory for the crate
    default: "."
    required: false
  dry-run:
    description: Whether to do a dry run (don't actually publish)
    default: "false"
    required: false

runs:
  using: composite
  steps:
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
    
    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Publish crate
      shell: bash
      env:
        CARGO_REGISTRY_TOKEN: ${{ inputs.token }}
      run: |
        echo "Publishing ${{ inputs.package }}..."
        cd ${{ inputs.working-directory }}
        
        if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
          echo "::error::CARGO_REGISTRY_TOKEN is empty. Crate publish requires a valid crates.io token (e.g. from rust-lang/crates-io-auth-action)."
          exit 1
        fi
        
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          echo "Dry run mode - would publish ${{ inputs.package }}"
          cargo publish -p ${{ inputs.package }} --dry-run
        else
          max_attempts=6
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            set +e
            publish_output="$(cargo publish -p ${{ inputs.package }} 2>&1)"
            publish_status=$?
            set -e
            if [ "$publish_status" -eq 0 ]; then
              echo "$publish_output"
              break
            fi
            if echo "$publish_output" | grep -qE 'already uploaded|already exists on crates\.io'; then
              echo "${{ inputs.package }} is already on crates.io; skipping"
              break
            fi
            if echo "$publish_output" | grep -qE '429 Too Many Requests|rate limit|too many updates'; then
              if [ "$attempt" -lt "$max_attempts" ]; then
                sleep_secs=$((attempt * 90))
                echo "crates.io rate limit hit for ${{ inputs.package }}; retry $attempt/$max_attempts after ${sleep_secs}s"
                echo "$publish_output"
                sleep "$sleep_secs"
                attempt=$((attempt + 1))
                continue
              fi
            fi
            echo "$publish_output"
            exit "$publish_status"
          done
        fi
        
        echo "Successfully published ${{ inputs.package }}"
