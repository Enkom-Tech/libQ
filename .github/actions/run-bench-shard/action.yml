# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Run benchmark shard
description: Run Criterion benchmarks for one workspace package (one CI matrix shard)
inputs:
  package:
    description: Cargo package name (-p)
    required: true
  features:
    description: Optional --features value
    default: ""
    required: false
  bench:
    description: Optional single --bench target name
    default: ""
    required: false
  working-directory:
    description: Directory to run cargo bench from (repo root by default)
    default: "."
    required: false
  rust-version:
    description: Rust toolchain version
    default: "stable"
    required: false

runs:
  using: composite
  steps:
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-version }}
        components: rust-src

    - name: Restore cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-bench-

    - name: Run benchmark shard
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        ARGS=(-p "${{ inputs.package }}")
        if [[ -n "${{ inputs.features }}" ]]; then
          ARGS+=(-f "${{ inputs.features }}")
        fi
        if [[ -n "${{ inputs.bench }}" ]]; then
          ARGS+=(-b "${{ inputs.bench }}")
        fi
        echo "Package: ${{ inputs.package }}"
        bash ./scripts/run-criterion-benches.sh "${ARGS[@]}"
