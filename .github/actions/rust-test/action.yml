name: Rust Test
description: Reusable Rust test action with matrix support and comprehensive testing
inputs:
  working-directory:
    description: Working directory for the crate
    default: "."
    required: false
  features:
    description: Features to enable for testing
    default: ""
    required: false
  package:
    description: Specific package to test (optional)
    default: ""
    required: false
  rust-version:
    description: Rust toolchain version to use
    default: "stable"
    required: false
  run-release-tests:
    description: Whether to run release tests
    default: "true"
    required: false
  run-coverage:
    description: Whether to run coverage tests
    default: "false"
    required: false
  coverage-threshold:
    description: Minimum coverage threshold percentage
    default: "95"
    required: false

runs:
  using: composite
  steps:
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-version }}
        components: rustfmt, clippy, rust-src
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-rust-
    
    - name: Install cargo-tarpaulin (if coverage enabled)
      if: inputs.run-coverage == 'true'
      shell: bash
      run: cargo install cargo-tarpaulin
    
    - name: Run tests
      shell: bash
      run: |
        echo "Running tests..."
        cd ${{ inputs.working-directory }}

        # Check if we're running no_std tests and adjust accordingly
        FEATURES="${{ inputs.features }}"
        PACKAGE="${{ inputs.package }}"
        if [[ "$FEATURES" == *"no_std"* || "$PACKAGE" == *"lib-q-keccak"* || "$PACKAGE" == *"lib-q-ascon"* ]]; then
          echo "Running no_std or no_std-compatible compilation check"
          echo "Cannot run tests in no_std mode or for no_std-compatible packages"
          if [[ -n "$PACKAGE" && "$PACKAGE" != "" ]]; then
            echo "Testing specific package: $PACKAGE"
            # Check that the specific package compiles in no_std mode
            if [[ "$PACKAGE" == *"lib-q-keccak"* ]]; then
              echo "Building no_std package $PACKAGE with explicit panic handler"
              cargo check -p $PACKAGE --profile dev-no-std --no-default-features --features "$FEATURES,no_std_panic_handler" --verbose
            elif [[ "$PACKAGE" == *"lib-q-ascon"* ]]; then
              echo "Building no_std package $PACKAGE with explicit panic handler"
              cargo check -p $PACKAGE --profile dev-no-std --no-default-features --features "$FEATURES,no_std_panic_handler" --verbose
            else
              cargo check -p $PACKAGE --no-default-features --features "$FEATURES" --verbose
            fi
          else
            echo "Testing workspace with no_std features"
            # For workspace no_std check, just verify compilation
            cargo check --no-default-features --features "$FEATURES" --verbose
          fi
        else
          if [[ -n "$PACKAGE" && "$PACKAGE" != "" ]]; then
            cargo test -p $PACKAGE --features "$FEATURES" --verbose
          else
            cargo test --features "$FEATURES" --verbose
          fi
        fi
        echo "Tests completed"
    
    - name: Run release tests
      if: inputs.run-release-tests == 'true'
      shell: bash
      run: |
        echo "Running release tests..."
        cd ${{ inputs.working-directory }}

        # Check if we're running no_std tests and adjust accordingly
        FEATURES="${{ inputs.features }}"
        PACKAGE="${{ inputs.package }}"
        if [[ "$FEATURES" == *"no_std"* || "$PACKAGE" == *"lib-q-keccak"* || "$PACKAGE" == *"lib-q-ascon"* ]]; then
          echo "Running no_std or no_std-compatible release compilation check"
          echo "Cannot run tests in no_std mode or for no_std-compatible packages"
          if [[ -n "$PACKAGE" && "$PACKAGE" != "" ]]; then
            echo "Testing specific package in release: $PACKAGE"
            # Check that the specific package compiles in no_std mode for release
            if [[ "$PACKAGE" == *"lib-q-keccak"* ]]; then
              echo "Building no_std package $PACKAGE with explicit panic handler in release mode"
              cargo check -p $PACKAGE --profile release --no-default-features --features "$FEATURES,no_std_panic_handler" --verbose
            elif [[ "$PACKAGE" == *"lib-q-ascon"* ]]; then
              echo "Building no_std package $PACKAGE with explicit panic handler in release mode"
              cargo check -p $PACKAGE --profile release --no-default-features --features "$FEATURES,no_std_panic_handler" --verbose
            else
              cargo check -p $PACKAGE --no-default-features --features "$FEATURES" --release --verbose
            fi
          else
            echo "Testing workspace with no_std features in release"
            # For workspace no_std check, just verify compilation for release
            cargo check --no-default-features --features "$FEATURES" --release --verbose
          fi
        else
          if [[ -n "$PACKAGE" && "$PACKAGE" != "" ]]; then
            cargo test -p $PACKAGE --features "$FEATURES" --release --verbose
          else
            cargo test --features "$FEATURES" --release --verbose
          fi
        fi
        echo "Release tests completed"
    
    - name: Generate coverage report
      if: inputs.run-coverage == 'true' && inputs.features != 'no_std*'
      shell: bash
      run: |
        echo "Generating coverage report..."
        cd ${{ inputs.working-directory }}
        PACKAGE="${{ inputs.package }}"
        FEATURES="${{ inputs.features }}"
        
        # Build tarpaulin command with appropriate options
        TARPAULIN_CMD="cargo tarpaulin --out Html,Xml --output-dir coverage"
        
        # Add package filter if specified
        if [[ -n "$PACKAGE" && "$PACKAGE" != "" ]]; then
          TARPAULIN_CMD="$TARPAULIN_CMD --packages $PACKAGE"
        fi
        
        # Add features
        if [[ "$FEATURES" == *"no_std"* ]]; then
          TARPAULIN_CMD="$TARPAULIN_CMD --no-default-features --features \"$FEATURES\""
        elif [[ "$PACKAGE" == "lib-q-core" ]]; then
          # lib-q-core needs std,rand features for proper coverage
          TARPAULIN_CMD="$TARPAULIN_CMD --features \"std,rand\""
        elif [[ "$PACKAGE" == "lib-q" ]]; then
          # lib-q needs all-algorithms feature
          TARPAULIN_CMD="$TARPAULIN_CMD --features \"all-algorithms\""
        elif [[ -n "$FEATURES" ]]; then
          TARPAULIN_CMD="$TARPAULIN_CMD --features \"$FEATURES\""
        fi
        
        # Always exclude reference implementations and build artifacts
        TARPAULIN_CMD="$TARPAULIN_CMD --exclude-files \"reference/*\" --exclude-files \"target/*\" --exclude-files \"benches/*\" --exclude-files \"examples/*\""
        
        # For specific packages, exclude all other crates to focus coverage calculation
        if [[ "$PACKAGE" == "lib-q-core" ]]; then
          TARPAULIN_CMD="$TARPAULIN_CMD --exclude-files \"lib-q-ascon/*\" --exclude-files \"lib-q-hash/*\" --exclude-files \"lib-q-hpke/*\" --exclude-files \"lib-q-intrinsics/*\" --exclude-files \"lib-q-k12/*\" --exclude-files \"lib-q-keccak/*\" --exclude-files \"lib-q-kem/*\" --exclude-files \"lib-q-ml-dsa/*\" --exclude-files \"lib-q-ml-kem/*\" --exclude-files \"lib-q-sha3/*\" --exclude-files \"lib-q-sig/*\" --exclude-files \"lib-q-aead/*\" --exclude-files \"lib-q-platform/*\" --exclude-files \"lib-q-utils/*\" --exclude-files \"lib-q-zkp/*\" --exclude-files \"lib-q-sponge/*\""
        elif [[ "$PACKAGE" == "lib-q" ]]; then
          # For the root lib-q package, we need to be more selective about what to include
          # Only include the main lib.rs and core functionality, exclude most implementation details
          TARPAULIN_CMD="$TARPAULIN_CMD --exclude-files \"lib-q-ml-dsa/*\" --exclude-files \"lib-q-ml-kem/*\" --exclude-files \"lib-q-kem/*\" --exclude-files \"lib-q-sig/*\" --exclude-files \"lib-q-aead/*\" --exclude-files \"lib-q-hpke/*\" --exclude-files \"lib-q-zkp/*\" --exclude-files \"lib-q-platform/*\" --exclude-files \"lib-q-intrinsics/*\" --exclude-files \"lib-q-utils/*\""
        fi
        
        echo "Running: $TARPAULIN_CMD"
        eval "$TARPAULIN_CMD"
        echo "Coverage report generated"

    - name: Check coverage threshold
      if: inputs.run-coverage == 'true' && inputs.features != 'no_std*'
      shell: bash
      run: |
        echo "Checking coverage threshold..."
        cd ${{ inputs.working-directory }}
        
        # Extract coverage percentage from the XML file generated in the previous step
        if [[ -f "coverage/cobertura.xml" ]]; then
          # Parse the XML file to extract coverage percentage
          COVERAGE=$(grep -o 'line-rate="[0-9.]*"' coverage/cobertura.xml | head -1 | sed 's/line-rate="//' | sed 's/"//' | awk '{print $1 * 100}')
          
          # Check if we got a valid coverage percentage
          if [[ -z "$COVERAGE" || "$COVERAGE" == "0" ]]; then
            echo "WARNING: Could not extract coverage percentage from XML file"
            echo "XML file contents:"
            head -20 coverage/cobertura.xml
            echo "Setting coverage to 0% for threshold check"
            COVERAGE="0"
          fi
          
          echo "Coverage: ${COVERAGE}%"
          
          # Use awk for floating point comparison instead of bc
          if awk "BEGIN {exit !($COVERAGE < ${{ inputs.coverage-threshold }})}"; then
            echo "ERROR: Coverage ${COVERAGE}% is below ${{ inputs.coverage-threshold }}% threshold"
            exit 1
          fi
          echo "Coverage threshold check passed"
        else
          echo "ERROR: Coverage XML file not found"
          echo "Available files in coverage directory:"
          ls -la coverage/ || echo "Coverage directory does not exist"
          exit 1
        fi
