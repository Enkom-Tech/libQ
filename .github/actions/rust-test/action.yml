# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Rust Test
description: Reusable Rust test action with matrix support and comprehensive testing
inputs:
  working-directory:
    description: Working directory for the crate
    default: "."
    required: false
  features:
    description: Features to enable for testing
    default: ""
    required: false
  package:
    description: Specific package to test (optional)
    default: ""
    required: false
  packages:
    description: >-
      Space-separated packages to test together. Entries without '@' share --features with
      inputs.features and are passed in one cargo test -p ... -p ... run. Use pkg@feat1,feat2
      for a package that needs different features (runs a separate cargo test per such entry).
      When non-empty, takes precedence over package for the normal (non-no_std) test paths.
    default: ""
    required: false
  rust-version:
    description: Rust toolchain version to use
    default: "stable"
    required: false
  run-release-tests:
    description: Whether to run release tests
    default: "true"
    required: false
  run-coverage:
    description: Whether to run coverage tests
    default: "false"
    required: false
  coverage-threshold:
    description: Minimum coverage threshold percentage
    default: "95"
    required: false
  coverage-branch-threshold:
    description: >-
      Optional minimum branch coverage from cobertura.xml when the toolchain emits
      branch data (branches-valid > 0). Empty string skips the branch check.
    default: ""
    required: false

runs:
  using: composite
  steps:
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-version }}
        components: rustfmt, clippy, rust-src
    
    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-rust-
    
    - name: Set coverage skip flag
      id: coverage-skip
      if: inputs.run-coverage == 'true'
      shell: bash
      run: |
        FEATURES="${{ inputs.features }}"
        PACKAGE="${{ inputs.package }}"
        PACKAGES="${{ inputs.packages }}"
        if [[ "$FEATURES" == *"no_std"* || "$PACKAGE" == *"lib-q-keccak"* || "$PACKAGES" == *"lib-q-keccak"* ]]; then
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Install cargo-tarpaulin (if coverage enabled)
      if: inputs.run-coverage == 'true' && steps.coverage-skip.outputs.skip != 'true'
      shell: bash
      run: cargo install cargo-tarpaulin
    
    - name: Run tests
      shell: bash
      run: |
        echo "Running tests..."
        cd ${{ inputs.working-directory }}

        # Check if we're running no_std tests and adjust accordingly
        FEATURES="${{ inputs.features }}"
        PACKAGE="${{ inputs.package }}"
        PACKAGES="${{ inputs.packages }}"
        if [[ "$PACKAGE" == "lib-q-kem" && -z "$FEATURES" ]]; then
          FEATURES="std,alloc,ml-kem,hqc"
        fi
        if [[ "$FEATURES" == *"no_std"* || "$PACKAGE" == *"lib-q-keccak"* || "$PACKAGES" == *"lib-q-keccak"* ]]; then
          echo "Running no_std or no_std-compatible compilation check"
          echo "Cannot run tests in no_std mode or for no_std-compatible packages"
          if [[ -n "$PACKAGE" && "$PACKAGE" != "" ]]; then
            echo "Testing specific package: $PACKAGE"
            # Check that the specific package compiles in no_std mode
            if [[ "$PACKAGE" == *"lib-q-keccak"* ]]; then
              echo "Building no_std package $PACKAGE with explicit panic handler"
              cargo check -p $PACKAGE --profile dev-no-std --no-default-features --features "$FEATURES,no_std_panic_handler" --verbose
            elif [[ "$PACKAGE" == "lib-q-core" ]]; then
              echo "Building lib-q-core no_std (cdylib) with dev-no-std + no_std_panic_handler"
              cargo check -p $PACKAGE --profile dev-no-std --no-default-features --features "$FEATURES,no_std_panic_handler" --verbose
            else
              echo "Building no_std package $PACKAGE with dev-no-std profile (panic=abort)"
              cargo check -p $PACKAGE --profile dev-no-std --no-default-features --features "$FEATURES" --verbose
            fi
          else
            echo "Testing workspace with no_std features"
            # For workspace no_std check, just verify compilation
            cargo check --profile dev-no-std --no-default-features --features "$FEATURES" --verbose
          fi
        else
          if [[ -n "$PACKAGES" ]]; then
            SHARED_FLAGS=""
            for item in $PACKAGES; do
              if [[ "$item" == *"@"* ]]; then
                pkg="${item%%@*}"
                pfeats="${item#*@}"
                echo "Running dev tests for $pkg with features $pfeats"
                cargo test -p "$pkg" --features "$pfeats" --verbose
              else
                if [[ -z "$SHARED_FLAGS" ]]; then
                  SHARED_FLAGS="-p $item"
                else
                  SHARED_FLAGS="$SHARED_FLAGS -p $item"
                fi
              fi
            done
            if [[ -n "$SHARED_FLAGS" ]]; then
              echo "Running dev tests with $SHARED_FLAGS and features $FEATURES"
              cargo test $SHARED_FLAGS --features "$FEATURES" --verbose
            fi
          elif [[ -n "$PACKAGE" && "$PACKAGE" != "" ]]; then
            if [[ "$PACKAGE" == "lib-q-fn-dsa" ]]; then
              echo "Skipping full dev test suite for lib-q-fn-dsa (quick smoke runs in release step only)"
            else
              cargo test -p $PACKAGE --features "$FEATURES" --verbose
            fi
          else
            cargo test --features "$FEATURES" --verbose
          fi
        fi
        echo "Tests completed"
    
    - name: Run release tests
      if: inputs.run-release-tests == 'true'
      shell: bash
      run: |
        echo "Running release tests..."
        cd ${{ inputs.working-directory }}

        # Check if we're running no_std tests and adjust accordingly
        FEATURES="${{ inputs.features }}"
        PACKAGE="${{ inputs.package }}"
        PACKAGES="${{ inputs.packages }}"
        if [[ "$PACKAGE" == "lib-q-kem" && -z "$FEATURES" ]]; then
          FEATURES="std,alloc,ml-kem,hqc"
        fi
        if [[ "$FEATURES" == *"no_std"* || "$PACKAGE" == *"lib-q-keccak"* || "$PACKAGES" == *"lib-q-keccak"* ]]; then
          echo "Running no_std or no_std-compatible release compilation check"
          echo "Cannot run tests in no_std mode or for no_std-compatible packages"
          if [[ -n "$PACKAGE" && "$PACKAGE" != "" ]]; then
            echo "Testing specific package in release: $PACKAGE"
            # Check that the specific package compiles in no_std mode for release
            if [[ "$PACKAGE" == *"lib-q-keccak"* ]]; then
              echo "Building no_std package $PACKAGE with explicit panic handler in release mode"
              cargo check -p $PACKAGE --profile release --no-default-features --features "$FEATURES,no_std_panic_handler" --verbose
            elif [[ "$PACKAGE" == "lib-q-core" ]]; then
              echo "Building lib-q-core no_std release check with release-security + no_std_panic_handler"
              cargo check -p $PACKAGE --profile release-security --no-default-features --features "$FEATURES,no_std_panic_handler" --verbose
            else
              echo "Building no_std package $PACKAGE with release-security profile (panic=abort)"
              cargo check -p $PACKAGE --profile release-security --no-default-features --features "$FEATURES" --verbose
            fi
          else
            echo "Testing workspace with no_std features in release"
            # For workspace no_std check, just verify compilation for release
            cargo check --profile release-security --no-default-features --features "$FEATURES" --verbose
          fi
        else
          if [[ -n "$PACKAGES" ]]; then
            SHARED_FLAGS=""
            for item in $PACKAGES; do
              if [[ "$item" == *"@"* ]]; then
                pkg="${item%%@*}"
                pfeats="${item#*@}"
                echo "Running release tests for $pkg with features $pfeats"
                cargo test -p "$pkg" --features "$pfeats" --release --verbose
              else
                if [[ -z "$SHARED_FLAGS" ]]; then
                  SHARED_FLAGS="-p $item"
                else
                  SHARED_FLAGS="$SHARED_FLAGS -p $item"
                fi
              fi
            done
            if [[ -n "$SHARED_FLAGS" ]]; then
              echo "Running release tests with $SHARED_FLAGS and features $FEATURES"
              cargo test $SHARED_FLAGS --features "$FEATURES" --release --verbose
            fi
          elif [[ -n "$PACKAGE" && "$PACKAGE" != "" ]]; then
            if [[ "$PACKAGE" == "lib-q-fn-dsa" ]]; then
              echo "Running quick FN-DSA smoke tests (release). Full keygen KAT: cargo test -p fn-dsa-kgen test_keygen --release -- --test-threads=1"
              cd "${GITHUB_WORKSPACE:-.}"
              FN_FEAT="${FEATURES:-std,rand}"
              cargo test -p fn-dsa self_test --release -- --test-threads=1
              cargo test -p lib-q-fn-dsa keypair_generation --release --features "$FN_FEAT"
              cargo test -p lib-q-fn-dsa test_basic_fn_dsa_functionality --release --features "$FN_FEAT"
            else
              cargo test -p $PACKAGE --features "$FEATURES" --release --verbose
            fi
          else
            cargo test --features "$FEATURES" --release --verbose
          fi
        fi
        echo "Release tests completed"
    
    - name: Generate coverage report
      if: inputs.run-coverage == 'true' && steps.coverage-skip.outputs.skip != 'true'
      shell: bash
      run: |
        echo "Generating coverage report..."
        cd ${{ inputs.working-directory }}
        PACKAGE="${{ inputs.package }}"
        FEATURES="${{ inputs.features }}"
        if [[ "$PACKAGE" == "lib-q-kem" && -z "$FEATURES" ]]; then
          FEATURES="std,alloc,ml-kem,hqc"
        fi
        
        # Build tarpaulin command with appropriate options
        TARPAULIN_CMD="cargo tarpaulin --out Html --out Xml --output-dir coverage"
        
        # Add package filter if specified
        if [[ -n "$PACKAGE" && "$PACKAGE" != "" ]]; then
          TARPAULIN_CMD="$TARPAULIN_CMD --packages $PACKAGE"
        fi
        
        # Add features
        if [[ "$FEATURES" == *"no_std"* ]]; then
          TARPAULIN_CMD="$TARPAULIN_CMD --no-default-features --features \"$FEATURES\""
        elif [[ "$PACKAGE" == "lib-q-core" ]]; then
          # lib-q-core needs std,rand features for proper coverage
          TARPAULIN_CMD="$TARPAULIN_CMD --features \"std,rand\""
        elif [[ "$PACKAGE" == "lib-q" ]]; then
          # lib-q needs all-algorithms feature
          TARPAULIN_CMD="$TARPAULIN_CMD --features \"all-algorithms\""
        elif [[ "$PACKAGE" == "lib-q-fn-dsa" ]]; then
          TARPAULIN_CMD="$TARPAULIN_CMD --features \"std,rand\""
        elif [[ "$PACKAGE" == "lib-q-cb-kem" ]]; then
          TARPAULIN_CMD="$TARPAULIN_CMD --features \"std,rand,getrandom,alloc,zeroize,cbkem348864\""
        elif [[ "$PACKAGE" == "lib-q-kem" ]]; then
          TARPAULIN_CMD="$TARPAULIN_CMD --features \"std,alloc,ml-kem,hqc\""
        elif [[ -n "$FEATURES" ]]; then
          TARPAULIN_CMD="$TARPAULIN_CMD --features \"$FEATURES\""
        fi
        
        # Always exclude build artifacts and non-library trees from coverage
        TARPAULIN_CMD="$TARPAULIN_CMD --exclude-files \"target/*\" --exclude-files \"benches/*\" --exclude-files \"examples/*\""
        
        # For specific packages, exclude all other crates to focus coverage calculation
        if [[ "$PACKAGE" == "lib-q-core" ]]; then
          TARPAULIN_CMD="$TARPAULIN_CMD --exclude-files \"lib-q-hash/*\" --exclude-files \"lib-q-hpke/*\" --exclude-files \"lib-q-intrinsics/*\" --exclude-files \"lib-q-k12/*\" --exclude-files \"lib-q-keccak/*\" --exclude-files \"lib-q-kem/*\" --exclude-files \"lib-q-ml-dsa/*\" --exclude-files \"lib-q-ml-kem/*\" --exclude-files \"lib-q-sha3/*\" --exclude-files \"lib-q-sig/*\" --exclude-files \"lib-q-aead/*\" --exclude-files \"lib-q-platform/*\" --exclude-files \"lib-q-utils/*\" --exclude-files \"lib-q-zkp/*\""
          # PR/coverage runs use std,rand only; wasm sources are not part of that build — keep the percentage aligned.
          TARPAULIN_CMD="$TARPAULIN_CMD --exclude-files \"lib-q-core/src/wasm/*\""
          TARPAULIN_CMD="$TARPAULIN_CMD --include-files \"lib-q-core/src/*\" --include-files \"lib-q-core/src/**\" --include-files \"lib-q-core\\\\src\\\\*\""
        elif [[ "$PACKAGE" == "lib-q" ]]; then
          # Umbrella crate: count only lib-q/src so the gate reflects this package, not all deps.
          # Repeat patterns so paths match on Linux (/) and Windows (\) in reports.
          TARPAULIN_CMD="$TARPAULIN_CMD --include-files \"lib-q/src/*\" --include-files \"lib-q/src/**\" --include-files \"lib-q\\\\src\\\\*\""
        elif [[ "$PACKAGE" == "lib-q-keccak" ]]; then
          # Without include-files, Cobertura aggregates the whole instrumented graph (~tens of k lines) and the % collapses.
          TARPAULIN_CMD="$TARPAULIN_CMD --include-files \"lib-q-keccak/src/*\" --include-files \"lib-q-keccak/src/**\" --include-files \"lib-q-keccak\\\\src\\\\*\""
          # advanced_simd is nightly/simd-only; stable PR coverage does not execute it — drop from the gate denominator.
          TARPAULIN_CMD="$TARPAULIN_CMD --exclude-files \"lib-q-keccak/src/advanced_simd.rs\" --exclude-files \"lib-q-keccak\\\\src\\\\advanced_simd.rs\""
        elif [[ "$PACKAGE" == "lib-q-hash" ]]; then
          TARPAULIN_CMD="$TARPAULIN_CMD --include-files \"lib-q-hash/src/*\" --include-files \"lib-q-hash/src/**\" --include-files \"lib-q-hash\\\\src\\\\*\""
        elif [[ -n "$PACKAGE" && "$PACKAGE" != "" ]]; then
          PIN="${{ github.workspace }}/scripts/print-tarpaulin-include-args.sh"
          if [[ ! -f "$PIN" ]]; then
            echo "ERROR: Missing $PIN"
            exit 1
          fi
          if ! INC="$(bash "$PIN" "$PACKAGE" | tr -d '\r')"; then
            echo "ERROR: Could not build tarpaulin --include-files for package '$PACKAGE'"
            exit 1
          fi
          TARPAULIN_CMD="$TARPAULIN_CMD ${INC}"
        fi
        
        if [[ -n "$PACKAGE" && "$PACKAGE" != "" ]]; then
          if ! echo "$TARPAULIN_CMD" | grep -q -- '--include-files'; then
            echo "ERROR: Tarpaulin command has no --include-files for package '$PACKAGE' (Cobertura line-rate would be invalid)."
            exit 1
          fi
        fi
        
        if [[ "$PACKAGE" == "lib-q-fn-dsa" ]]; then
          TARPAULIN_CMD="$TARPAULIN_CMD -- keypair_generation test_basic_fn_dsa_functionality"
        elif [[ "$PACKAGE" == "lib-q-kem" ]]; then
          TARPAULIN_CMD="$TARPAULIN_CMD -- --test-threads=1"
        fi
        
        echo "Running: $TARPAULIN_CMD"
        eval "$TARPAULIN_CMD"
        echo "Coverage report generated"

    - name: Check coverage threshold
      if: inputs.run-coverage == 'true' && steps.coverage-skip.outputs.skip != 'true'
      shell: bash
      run: |
        echo "Checking coverage threshold..."
        cd ${{ inputs.working-directory }}
        CHECK="${{ github.workspace }}/scripts/check-coverage-metrics.sh"
        if [[ ! -f "$CHECK" ]]; then
          echo "ERROR: Missing $CHECK"
          exit 1
        fi
        BRANCH_ARGS=()
        if [[ -n "${{ inputs.coverage-branch-threshold }}" ]]; then
          BRANCH_ARGS=(--branch-min "${{ inputs.coverage-branch-threshold }}")
        fi
        if ! bash "$CHECK" --dir coverage --line-min "${{ inputs.coverage-threshold }}" "${BRANCH_ARGS[@]}"; then
          echo "ERROR: Coverage check failed (see messages above)"
          ls -la coverage/ || echo "Coverage directory does not exist"
          exit 1
        fi
