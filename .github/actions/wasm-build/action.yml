name: WASM Build
description: Reusable WASM build action with multiple targets and package support
inputs:
  working-directory:
    description: Working directory for the crate
    default: "."
    required: false
  features:
    description: Features to enable for building
    default: ""
    required: false
  targets:
    description: Comma-separated list of targets (web,nodejs)
    default: "web,nodejs"
    required: false
  out-dir:
    description: Output directory for wasm-pack (default pkg)
    default: "pkg"
    required: false
  rust-version:
    description: Rust toolchain version to use
    default: "stable"
    required: false
  verify-artifacts:
    description: Whether to verify build artifacts
    default: "true"
    required: false
  cache-pkg:
    description: Whether to cache pkg directory
    default: "true"
    required: false

runs:
  using: composite
  steps:
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-version }}
        components: rustfmt, clippy, rust-src
        targets: wasm32-unknown-unknown
    
    - name: Install wasm-pack
      uses: jetli/wasm-pack-action@v0.4.0
      with:
        version: latest
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
          ${{ inputs.cache-pkg == 'true' && format('{0}/{1}', inputs.working-directory, inputs.out-dir) || '' }}
        key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-wasm-
    
    - name: Build WASM for web target
      if: contains(inputs.targets, 'web')
      shell: bash
      env:
        # Ensure getrandom WASM backend is properly configured
        CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUSTFLAGS: '--cfg getrandom_backend="wasm_js" -C panic=abort'
      run: |
        echo "Building WASM for web target..."
        cd ${{ inputs.working-directory }}
        OUT_DIR="${{ inputs.out-dir }}"
        if [ -n "${{ inputs.features }}" ]; then
          echo "Pre-checking with cargo for feature resolution..."
          cargo check --target wasm32-unknown-unknown --features "${{ inputs.features }}" --lib
          echo "Building with wasm-pack..."
          wasm-pack build --target web --out-dir "$OUT_DIR" -- --features "${{ inputs.features }}" --verbose
        else
          wasm-pack build --target web --out-dir "$OUT_DIR" --verbose
        fi
        echo "WASM web build completed successfully"
    
    - name: Build WASM for nodejs target
      if: contains(inputs.targets, 'nodejs')
      shell: bash
      env:
        # Ensure getrandom WASM backend is properly configured
        CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUSTFLAGS: '--cfg getrandom_backend="wasm_js" -C panic=abort'
      run: |
        echo "Building WASM for nodejs target..."
        cd ${{ inputs.working-directory }}
        OUT_DIR="${{ inputs.out-dir }}"
        if [ -n "${{ inputs.features }}" ]; then
          echo "Pre-checking with cargo for feature resolution..."
          cargo check --target wasm32-unknown-unknown --features "${{ inputs.features }}" --lib
          echo "Building with wasm-pack..."
          wasm-pack build --target nodejs --out-dir "$OUT_DIR" -- --features "${{ inputs.features }}" --verbose
        else
          wasm-pack build --target nodejs --out-dir "$OUT_DIR" --verbose
        fi
        echo "WASM nodejs build completed successfully"
    
    - name: Verify WASM artifacts
      if: inputs.verify-artifacts == 'true'
      shell: bash
      run: |
        echo "Verifying WASM build artifacts..."
        cd ${{ inputs.working-directory }}
        OUT_DIR="${{ inputs.out-dir }}"
        ls -la "$OUT_DIR"/ || echo "No $OUT_DIR directory found"
        if [ -d "$OUT_DIR" ]; then
          echo "WASM package contents:"
          ls -la "$OUT_DIR"/
          echo "WASM file size:"
          ls -lh "$OUT_DIR"/*.wasm 2>/dev/null || echo "No .wasm files found"
        fi
