name: WASM API Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: wasm-docs-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build wasm32 docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Build WASM-target docs
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUSTFLAGS: '--cfg getrandom_backend="wasm_js" -C panic=abort'
        run: |
          rustup target add wasm32-unknown-unknown
          RUSTDOCFLAGS="--cfg docsrs" cargo doc --no-deps --target wasm32-unknown-unknown --features wasm -p lib-q-core

      # Single-crate `cargo doc` does not emit doc/index.html; Pages needs one at the site root.
      - name: Add Pages landing index
        run: |
          printf '%s\n' \
            '<!DOCTYPE html>' \
            '<html lang="en">' \
            '<head>' \
            '<meta charset="utf-8">' \
            '<meta http-equiv="refresh" content="0; url=lib_q_core/">' \
            '<link rel="canonical" href="lib_q_core/">' \
            '<title>lib-q-core (wasm32) API docs</title>' \
            '</head>' \
            '<body>' \
            '<p><a href="lib_q_core/">lib-q-core</a> API documentation (wasm32-unknown-unknown).</p>' \
            '</body>' \
            '</html>' \
            > target/wasm32-unknown-unknown/doc/index.html

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: target/wasm32-unknown-unknown/doc

  deploy:
    name: Deploy docs to Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
      deployments: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Prune old GitHub Pages deployments
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner,
              repo,
              environment: 'github-pages',
              per_page: 100,
            });
            for (const deployment of deployments) {
              await github.rest.repos.deleteDeployment({
                owner,
                repo,
                deployment_id: deployment.id,
              });
            }
            core.info(
              deployments.length === 0
                ? 'No previous github-pages deployments to prune'
                : `Pruned ${deployments.length} previous github-pages deployment(s)`,
            );

      - id: deployment
        uses: actions/deploy-pages@v5
