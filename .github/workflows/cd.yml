name: CD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  # Pre-release validation
  pre-release-validation:
    name: Pre-Release Validation
    runs-on: ubuntu-latest
    # audit/fmt/clippy + rust-test (std,all-algorithms); CI test-matrix allows 60m for that shard alone.
    timeout-minutes: 150
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
      cache-key: ${{ steps.cache-key.outputs.value }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Extract version
        id: extract-version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}  # Remove 'v' prefix if present
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"
      
      - name: Generate cache key
        id: cache-key
        run: echo "value=${{ github.sha }}-${{ github.run_id }}" >> $GITHUB_OUTPUT
      
      - name: Validate version consistency
        run: |
          VERSION=${{ steps.extract-version.outputs.version }}
          CARGO_VERSION=$(sed -n '/^\[workspace\.package\]/,/^\[/p' Cargo.toml | grep '^version = ' | head -1 | cut -d'"' -f2)
          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "❌ Version mismatch: tag $VERSION != Cargo.toml $CARGO_VERSION"
            exit 1
          fi
          echo "✅ Version consistency validated: $VERSION"
      
      - name: Run comprehensive validation
        uses: ./.github/actions/rust-build
        with:
          run-security-audit: "true"
          run-format-check: "true"
          # Clippy and tests run once below (workspace --all-features) to avoid triple compile/test.
          run-clippy: "false"
          run-tests: "false"
          run-workspace-builds: "false"
          features: "all-algorithms"

      - name: Clippy (workspace, all targets, all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Match CI test-matrix "all-algorithms" (not --all-features): avoids optional
      # feature explosion and uses rust-test FN-DSA release-ci smoke paths.
      - name: Run workspace tests (std, all-algorithms)
        uses: ./.github/actions/rust-test
        with:
          features: "std,all-algorithms"
          run-release-tests: "true"

  # Rust crate publishing in dependency order (each tier after the previous).
  # Uses crates.io Trusted Publishing (OIDC); per-crate Settings -> Trusted Publishing
  # (see https://crates.io/docs/trusted-publishing).
  # lib-q-core depends on lib-q-types; publish types first.
  publish-rust-lib-q-types:
    name: Publish lib-q-types
    needs: pre-release-validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-types
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-0:
    name: Publish Rust (tier 0)
    needs: [publish-rust-lib-q-types]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: "lib-q-core"
          - package: "lib-q-keccak"
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: ${{ matrix.package }}
          token: ${{ steps.crates-io-auth.outputs.token }}

  # lib-q-sha3 must be on crates.io before lib-q-keccak-digest (and before other tier-1 crates that need it).
  # Matrix jobs are parallel: do not put lib-q-keccak-digest in the same matrix as lib-q-sha3.
  publish-rust-lib-q-sha3:
    name: Publish lib-q-sha3
    needs: [publish-rust-tier-0]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-sha3
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-1:
    name: Publish Rust (tier 1)
    needs: [publish-rust-lib-q-sha3]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: "lib-q-keccak-digest"
          - package: "lib-q-utils"
          - package: "lib-q-platform"
          - package: "lib-q-saturnin"
          - package: "lib-q-hqc-traits"
          - package: "lib-q-duplex-aead"
          - package: "lib-q-tweak-aead"
          - package: "lib-q-romulus"
          - package: "lib-q-ring"
          - package: "lib-q-prf"
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: ${{ matrix.package }}
          token: ${{ steps.crates-io-auth.outputs.token }}

  # k12 + intrinsics before hash/random; algorithm crates that depend on lib-q-random publish later.
  publish-rust-tier-2-early:
    name: Publish Rust (tier 2 — k12, intrinsics)
    needs: [publish-rust-tier-1]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: "lib-q-k12"
          - package: "lib-q-intrinsics"
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: ${{ matrix.package }}
          token: ${{ steps.crates-io-auth.outputs.token }}

  # lib-q-hash and lib-q-random must publish before crates that depend on lib-q-random (incl. dev-deps).
  # lib-q-random requires lib-q-k12 and resolves lib-q-hash from crates.io on publish.
  publish-rust-lib-q-hash:
    name: Publish lib-q-hash
    needs: [publish-rust-tier-2-early]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-hash
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-lib-q-random:
    name: Publish lib-q-random
    needs: [publish-rust-lib-q-hash]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-random
          token: ${{ steps.crates-io-auth.outputs.token }}

  # Nested FN-DSA crates (lib-q-fn-dsa-*); publish in dependency order (matrix jobs are parallel).
  publish-rust-fn-dsa-comm:
    name: Publish lib-q-fn-dsa-comm
    needs: [publish-rust-tier-1, publish-rust-lib-q-random]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-fn-dsa-comm
          working-directory: lib-q-fn-dsa/fn-dsa-comm
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-fn-dsa-kgen-sign:
    name: Publish FN-DSA (kgen, sign)
    needs: [publish-rust-fn-dsa-comm]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: "lib-q-fn-dsa-kgen"
            working-directory: "lib-q-fn-dsa/fn-dsa-kgen"
          - package: "lib-q-fn-dsa-sign"
            working-directory: "lib-q-fn-dsa/fn-dsa-sign"
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: ${{ matrix.package }}
          working-directory: ${{ matrix.working-directory }}
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-fn-dsa-vrfy:
    name: Publish lib-q-fn-dsa-vrfy
    needs: [publish-rust-fn-dsa-kgen-sign]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-fn-dsa-vrfy
          working-directory: lib-q-fn-dsa/fn-dsa-vrfy
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-fn-dsa-alg:
    name: Publish lib-q-fn-dsa-alg
    needs: [publish-rust-fn-dsa-vrfy]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-fn-dsa-alg
          working-directory: lib-q-fn-dsa/fn-dsa
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-lib-q-fn-dsa:
    name: Publish lib-q-fn-dsa
    needs: [publish-rust-fn-dsa-alg]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-fn-dsa
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-2:
    name: Publish Rust (tier 2 — algorithms)
    needs: [publish-rust-lib-q-fn-dsa, publish-rust-lib-q-random]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: "lib-q-ml-kem"
          - package: "lib-q-hqc"
          - package: "lib-q-slh-dsa"
          - package: "lib-q-lattice-zkp"
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: ${{ matrix.package }}
          token: ${{ steps.crates-io-auth.outputs.token }}

  # lib-q-kem lists optional cb-kem/ml-dsa in Cargo.toml; publish them before lib-q-kem.
  publish-rust-lib-q-cb-kem:
    name: Publish lib-q-cb-kem
    needs: [publish-rust-tier-2]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-cb-kem
          token: ${{ steps.crates-io-auth.outputs.token }}

  # lib-q-sig lists lib-q-ml-dsa in Cargo.toml; publish ml-dsa before sig/kem/ring-sig.
  publish-rust-lib-q-ml-dsa:
    name: Publish lib-q-ml-dsa
    needs: [publish-rust-tier-2]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-ml-dsa
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-3:
    name: Publish Rust (tier 3)
    needs: [publish-rust-lib-q-ml-dsa, publish-rust-lib-q-cb-kem]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: "lib-q-aead"
          - package: "lib-q-kem"
          - package: "lib-q-sig"
          - package: "lib-q-ring-sig"
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: ${{ matrix.package }}
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-4:
    name: Publish Rust (tier 4)
    needs: [publish-rust-tier-3]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: "lib-q-hpke"
          - package: "lib-q-sca-test"
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: ${{ matrix.package }}
          token: ${{ steps.crates-io-auth.outputs.token }}

  # Tiers 5–12: lib-q-stark subtree and lib-q-poseidon in dependency order.
  publish-rust-tier-5:
    name: Publish Rust (tier 5)
    needs: [publish-rust-tier-4]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: "lib-q-stark-util"
          - package: "lib-q-stark-rayon"
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: ${{ matrix.package }}
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-6:
    name: Publish Rust (tier 6 — stark-field)
    needs: [publish-rust-tier-5]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-stark-field
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-6-symmetric:
    name: Publish Rust (tier 6 — stark-symmetric)
    needs: [publish-rust-tier-6]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-stark-symmetric
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-7-matrix:
    name: Publish Rust (tier 7 — stark-matrix)
    needs: [publish-rust-tier-6-symmetric]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-stark-matrix
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-7:
    name: Publish Rust (tier 7 — stark-dft, commit)
    needs: [publish-rust-tier-7-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: "lib-q-stark-dft"
          - package: "lib-q-stark-commit"
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: ${{ matrix.package }}
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-8-hashes:
    name: Publish Rust (tier 8 — stark SHAKE/SHA3 adapters)
    needs: [publish-rust-tier-7]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: "lib-q-stark-shake256"
          - package: "lib-q-stark-shake128"
          - package: "lib-q-stark-sha3-256"
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: ${{ matrix.package }}
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-8:
    name: Publish Rust (tier 8 — stark-mds, field-testing)
    needs: [publish-rust-tier-7]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: "lib-q-stark-mds"
          - package: "lib-q-stark-field-testing"
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: ${{ matrix.package }}
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-9:
    name: Publish Rust (tier 9)
    needs: [publish-rust-tier-8, publish-rust-tier-8-hashes]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: "lib-q-stark-mersenne31"
          - package: "lib-q-stark-monty31"
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: ${{ matrix.package }}
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-10:
    name: Publish Rust (tier 10)
    needs: [publish-rust-tier-9]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: "lib-q-stark-challenger"
          - package: "lib-q-stark-interpolation"
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: ${{ matrix.package }}
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-11:
    name: Publish Rust (tier 11)
    needs: [publish-rust-tier-10]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: "lib-q-stark-air"
          - package: "lib-q-poseidon"
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: ${{ matrix.package }}
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-11-merkle:
    name: Publish Rust (tier 11 — stark-merkle)
    needs: [publish-rust-tier-11]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-stark-merkle
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-11-fri:
    name: Publish Rust (tier 11 — stark-fri)
    needs: [publish-rust-tier-11-merkle]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-stark-fri
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-12:
    name: Publish Rust (tier 12)
    needs: [publish-rust-tier-11-fri]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: "lib-q-stark"
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: ${{ matrix.package }}
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-13:
    name: Publish Rust (tier 13 — plonky multilinear, lookup)
    needs: [publish-rust-tier-12]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: "lib-q-plonky-multilinear-util"
          - package: "lib-q-plonky-lookup"
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: ${{ matrix.package }}
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-14:
    name: Publish Rust (tier 14 — plonky-uni-stark)
    needs: [publish-rust-tier-13]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-plonky-uni-stark
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-14-keccak:
    name: Publish Rust (tier 14 — plonky-keccak-air)
    needs: [publish-rust-tier-14]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-plonky-keccak-air
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-15:
    name: Publish Rust (tier 15 — plonky-batch-stark)
    needs: [publish-rust-tier-14]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-plonky-batch-stark
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-15-plonky:
    name: Publish Rust (tier 15 — lib-q-plonky)
    needs: [publish-rust-tier-15, publish-rust-tier-14-keccak]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q-plonky
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-16:
    name: Publish Rust (tier 16)
    needs: [publish-rust-tier-15-plonky]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: "lib-q-zkp"
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: ${{ matrix.package }}
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-rust-tier-17:
    name: Publish Rust (tier 17 — lib-q umbrella)
    needs: [publish-rust-tier-16]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: ./.github/actions/crates-io-auth
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish crate
        uses: ./.github/actions/crate-publish
        with:
          package: lib-q
          token: ${{ steps.crates-io-auth.outputs.token }}

  publish-wasm-packages:
    name: Publish WASM Packages
    needs: [pre-release-validation, publish-rust-tier-17]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - working-directory: "lib-q"
            package-name: "@lib-q/core"
            package-description: "Post-quantum cryptography library for Node.js (complete package)"
            package-keywords: "cryptography,post-quantum,security,wasm"
            features: "wasm,all-algorithms,ml-kem"
          - working-directory: "lib-q-ml-kem"
            package-name: "@lib-q/ml-kem"
            package-description: "NIST ML-KEM (Module-Lattice-based Key Encapsulation Mechanism) for Node.js"
            package-keywords: "cryptography,post-quantum,ml-kem,key-encapsulation,nist,wasm"
            features: "wasm"
          - working-directory: "lib-q-kem"
            package-name: "@lib-q/kem"
            package-description: "Post-quantum Key Encapsulation Mechanisms for Node.js"
            package-keywords: "cryptography,post-quantum,kem,key-encapsulation,wasm"
            features: "wasm,ml-kem"
          - working-directory: "lib-q-sig"
            package-name: "@lib-q/sig"
            package-description: "Post-quantum Digital Signatures for Node.js"
            package-keywords: "cryptography,post-quantum,signatures,digital-signatures,wasm"
            features: "wasm,ml-dsa"
            out-dir: "pkg-sig"
          - working-directory: "lib-q-hash"
            package-name: "@lib-q/hash"
            package-description: "Post-quantum Hash Functions for Node.js (SHA-3, SHAKE, cSHAKE, KMAC, TupleHash, ParallelHash)"
            package-keywords: "cryptography,post-quantum,hash,shake,kmac,tuplehash,parallelhash,wasm"
            features: "alloc,oid"
            out-dir: "pkg-hash"
          - working-directory: "lib-q-utils"
            package-name: "@lib-q/utils"
            package-description: "Utility functions for post-quantum cryptography"
            package-keywords: "cryptography,post-quantum,utilities,helpers,wasm"
            features: ""
            out-dir: "pkg-utils"
          - working-directory: "lib-q-fn-dsa"
            package-name: "@lib-q/fn-dsa"
            package-description: "FN-DSA (FIPS 206) post-quantum digital signatures for Node.js"
            package-keywords: "cryptography,post-quantum,fn-dsa,falcon,signature,wasm,nist"
            features: "wasm,std,rand"
            out-dir: "pkg"
          - working-directory: "lib-q-aead"
            package-name: "@lib-q/aead"
            package-description: "Post-quantum AEAD (Saturnin, Romulus, duplex-sponge) for Node.js"
            package-keywords: "cryptography,post-quantum,aead,saturnin,wasm,nist"
            features: "wasm,saturnin,romulus,duplex-sponge-aead"
            out-dir: "pkg"
          - working-directory: "lib-q-hpke"
            package-name: "@lib-q/hpke"
            package-description: "Post-quantum HPKE (RFC 9180) for Node.js"
            package-keywords: "cryptography,post-quantum,hpke,ml-kem,wasm"
            features: "wasm,alloc,ml-kem,saturnin,shake256"
            out-dir: "pkg"
          - working-directory: "lib-q-zkp"
            package-name: "@lib-q/zkp"
            package-description: "Post-quantum zero-knowledge proofs (STARK) for Node.js"
            package-keywords: "cryptography,post-quantum,zkp,stark,wasm"
            features: "wasm,zkp"
            out-dir: "pkg"
          - working-directory: "lib-q-random"
            package-name: "@lib-q/random"
            package-description: "Secure random bytes for post-quantum libQ on Node.js and WASM"
            package-keywords: "cryptography,random,entropy,wasm,getrandom"
            features: "wasm"
            out-dir: "pkg"
          - working-directory: "lib-q-hqc"
            package-name: "@lib-q/hqc"
            package-description: "HQC KEM (NIST PQC) for Node.js"
            package-keywords: "cryptography,post-quantum,hqc,kem,wasm"
            features: "wasm,hqc,random,serialization"
            out-dir: "pkg"
          - working-directory: "lib-q-slh-dsa"
            package-name: "@lib-q/slh-dsa"
            package-description: "SLH-DSA / SPHINCS+ (FIPS 205) signatures for Node.js"
            package-keywords: "cryptography,post-quantum,slh-dsa,sphincs,wasm"
            features: "wasm"
            out-dir: "pkg"
          - working-directory: "lib-q-cb-kem"
            package-name: "@lib-q/cb-kem"
            package-description: "Classical McEliece CB-KEM for Node.js (single compile-time parameter set)"
            package-keywords: "cryptography,post-quantum,mceliece,cb-kem,wasm"
            features: "wasm,cbkem348864,wasm_getrandom,alloc,zeroize"
            out-dir: "pkg"
          - working-directory: "lib-q-ring-sig"
            package-name: "@lib-q/ring-sig"
            package-description: "Federation ring-style openings / DualRing-LB pilot for Node.js"
            package-keywords: "cryptography,post-quantum,ring-signature,lattice,wasm"
            features: "wasm"
            out-dir: "pkg"
          - working-directory: "lib-q-prf"
            package-name: "@lib-q/prf"
            package-description: "Legendre / Gold PRF pilots for Node.js"
            package-keywords: "cryptography,post-quantum,prf,legendre,wasm"
            features: "wasm"
            out-dir: "pkg"
          - working-directory: "lib-q-stark"
            package-name: "@lib-q/stark"
            package-description: "STARK framework for Node.js (lib-q-stark); full prove/verify via @lib-q/zkp or Rust"
            package-keywords: "cryptography,post-quantum,stark,zkp,wasm"
            features: "wasm"
            out-dir: "pkg"
          - working-directory: "lib-q-plonky"
            package-name: "@lib-q/plonky"
            package-description: "Plonky3-derived ZK STARK components for Node.js"
            package-keywords: "cryptography,post-quantum,zkp,plonky,wasm"
            features: "wasm"
            out-dir: "pkg"
          - working-directory: "lib-q-poseidon"
            package-name: "@lib-q/poseidon"
            package-description: "Poseidon hash for STARK fields (Complex<Mersenne31>)"
            package-keywords: "cryptography,post-quantum,poseidon,zkp,wasm"
            features: "wasm,alloc"
            out-dir: "pkg"
          - working-directory: "lib-q-lattice-zkp"
            package-name: "@lib-q/lattice-zkp"
            package-description: "Module-lattice commitments and sigma protocols (research)"
            package-keywords: "cryptography,post-quantum,lattice,zkp,wasm"
            features: "wasm,random"
            out-dir: "pkg"
          - working-directory: "lib-q-ring"
            package-name: "@lib-q/ring"
            package-description: "ML-DSA ring arithmetic R_q for Node.js"
            package-keywords: "cryptography,post-quantum,lattice,ml-dsa,wasm"
            features: "wasm,alloc"
            out-dir: "pkg"

    steps:
      - uses: actions/checkout@v5
      
      - name: Build WASM
        uses: ./.github/actions/wasm-build
        with:
          working-directory: ${{ matrix.working-directory }}
          features: ${{ matrix.features }}
          targets: "web,nodejs"
          out-dir: ${{ matrix.out-dir || 'pkg' }}
          dev-profile: "false"
      
      - name: Publish NPM package
        uses: ./.github/actions/npm-publish
        with:
          package-name: ${{ matrix.package-name }}
          package-description: ${{ matrix.package-description }}
          package-keywords: ${{ matrix.package-keywords }}
          working-directory: ${{ format('{0}/{1}', matrix.working-directory, matrix.out-dir || 'pkg') }}
          crate-root: ${{ matrix.working-directory }}
          token: ${{ secrets.NPM_TOKEN }}
          version: ${{ needs.pre-release-validation.outputs.version }}

  # TypeScript-only package: publish after WASM tarballs so a types failure does not cancel wasm matrix jobs.
  publish-npm-types:
    name: Publish @lib-q/types
    needs: [pre-release-validation, publish-rust-tier-17]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Publish NPM package
        uses: ./.github/actions/npm-publish
        with:
          package-name: "@lib-q/types"
          package-description: "TypeScript typings for @lib-q WASM packages"
          package-keywords: "typescript,lib-q,wasm,types"
          working-directory: "npm/lib-q-types"
          token: ${{ secrets.NPM_TOKEN }}
          version: ${{ needs.pre-release-validation.outputs.version }}

  # Post-release tasks - run after publishing
  post-release:
    name: Post-Release Tasks
    needs: [pre-release-validation, publish-rust-tier-17, publish-wasm-packages, publish-npm-types]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Generate CycloneDX SBOM (lib-q wasm dependency graph)
        run: bash ./scripts/generate-wasm-sbom.sh
      
      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${{ needs.pre-release-validation.outputs.version }}
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" $PREVIOUS_TAG..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --reverse)
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: sbom/*.cdx.json
          fail_on_unmatched_files: true
          body: |
            ## What's Changed
            
            ${{ steps.changelog.outputs.changelog }}
            
            ## Installation
            
            ### Rust
            ```bash
            cargo add lib-q
            ```
            
            ### Node.js
            ```bash
            npm install @lib-q/core
            ```
            
            ## Security
            
            This release contains only NIST-approved post-quantum cryptographic algorithms.
            All operations are constant-time and side-channel resistant.
            
            ## Documentation
            
            - [API Documentation](https://docs.rs/lib-q)
            - [Security Model](https://github.com/Enkom-Tech/libQ/blob/main/docs/security.md)
            - [Development Guide](https://github.com/Enkom-Tech/libQ/blob/main/CONTRIBUTING.md)
          draft: false
          prerelease: false
          generate_release_notes: false

  # Security verification - runs after release
  security-verification:
    name: Post-Release Security Verification
    needs: [pre-release-validation, post-release]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      
      - name: Verify published Rust crate
        run: |
          VERSION=${{ needs.pre-release-validation.outputs.version }}
          echo "Verifying Rust crate version $VERSION..."
          cargo install --version $VERSION lib-q
          echo "✅ Rust crate verification successful"
      
      - name: Verify published WASM packages (ESM import + smoke export)
        env:
          LIBQ_NPM_VERSION: ${{ needs.pre-release-validation.outputs.version }}
        run: node "${{ github.workspace }}/scripts/npm-post-release-verify.mjs"
      
      - name: Run security tests
        run: |
          echo "Running security validation tests..."
          # Run constant_time tests for each package that has them
          cargo test --features "all-algorithms" --test constant_time -p lib-q-sha3 || echo "⚠️  constant_time test not available for lib-q-sha3"
          cargo test --features "all-algorithms" --test constant_time -p lib-q-k12 || echo "⚠️  constant_time test not available for lib-q-k12"
          echo "✅ Security tests completed successfully"

  # Final CD summary
  cd-summary:
    name: CD Summary
    needs: [pre-release-validation, publish-rust-tier-17, publish-wasm-packages, publish-npm-types, post-release, security-verification]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate CD summary
        run: |
          echo "## 🚀 CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.pre-release-validation.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pipeline Status:" >> $GITHUB_STEP_SUMMARY
          echo "- Pre-release validation: ${{ needs.pre-release-validation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Rust crate publishing: ${{ needs.publish-rust-tier-17.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- WASM package publishing: ${{ needs.publish-wasm-packages.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- @lib-q/types publishing: ${{ needs.publish-npm-types.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Release creation: ${{ needs.post-release.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security verification: ${{ needs.security-verification.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check for critical failures
          if [[ "${{ needs.pre-release-validation.result }}" == "failure" ]] || \
             [[ "${{ needs.publish-wasm-packages.result }}" == "failure" ]] || \
             [[ "${{ needs.publish-npm-types.result }}" == "failure" ]] || \
             [[ "${{ needs.post-release.result }}" == "failure" ]] || \
             [[ "${{ needs.security-verification.result }}" == "failure" ]]; then
            echo "❌ **Critical pipeline failures detected!**" >> $GITHUB_STEP_SUMMARY
            echo "Please review the failed jobs above." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          echo "✅ **Release ${{ needs.pre-release-validation.outputs.version }} deployed successfully!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Packages:" >> $GITHUB_STEP_SUMMARY
          echo "- Rust: [lib-q@${{ needs.pre-release-validation.outputs.version }}](https://crates.io/crates/lib-q)" >> $GITHUB_STEP_SUMMARY
          echo "- NPM: [@lib-q/core@${{ needs.pre-release-validation.outputs.version }}](https://www.npmjs.com/package/@lib-q/core)" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub: [Release ${{ github.ref_name }}](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})" >> $GITHUB_STEP_SUMMARY
