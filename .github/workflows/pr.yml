name: Pull Request Validation

on:
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Core PR validation - runs first and fastest
  core-validation:
    name: Core Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      cache-key: ${{ steps.cache-key.outputs.value }}
    steps:
      - uses: actions/checkout@v5
      
      - name: Generate cache key
        id: cache-key
        run: echo "value=${{ github.sha }}-${{ github.run_id }}" >> $GITHUB_OUTPUT
      
      - name: Core validation
        uses: ./.github/actions/rust-build
        with:
          run-security-audit: "true"
          run-format-check: "true"
          run-clippy: "true"
          run-tests: "false"
          run-workspace-builds: "false"
          features: "all-algorithms"
          package: "lib-q"
      
      - name: Check documentation
        run: cargo doc --all-features --no-deps --document-private-items

  # Security validation - parallel with core validation (audit already runs in core-validation)
  security-validation:
    name: Security Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Validate classical crypto compliance
        run: |
          echo "🔐 Running classical crypto validation..."
          cargo run -p lib-q-utils --bin security-validator --features "std" -- validate-classical
      
      - name: Validate SHA-3 compliance
        run: |
          echo "📊 Running SHA-3 compliance validation..."
          cargo run -p lib-q-utils --bin security-validator --features "std" -- validate-sha3

  # Test coverage analysis - runs after core validation
  # This is a focused coverage check for PRs
  # For full coverage analysis, see coverage.yml workflow
  test-coverage:
    name: Test Coverage
    needs: core-validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      
      # Determine which package to test based on PR changes
      - name: Determine affected packages
        id: affected-packages
        run: |
          # Fetch the base branch to ensure we can diff against it
          git fetch origin ${{ github.base_ref }}
          
          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD)
          
          # Define all lib-q crates
          CORE_CRATES="lib-q-core lib-q-keccak lib-q-hash lib-q-sha3 lib-q-k12"
          CRYPTO_CRATES="lib-q-kem lib-q-ml-kem lib-q-ml-dsa lib-q-sig lib-q-aead lib-q-hpke lib-q-fn-dsa"
          UTIL_CRATES="lib-q-platform lib-q-intrinsics lib-q-utils lib-q-zkp"
          STARK_PLONKY_CRATES="lib-q-stark lib-q-stark-air lib-q-stark-challenger lib-q-stark-commit lib-q-stark-dft lib-q-stark-field lib-q-stark-field-testing lib-q-stark-fri lib-q-stark-interpolation lib-q-stark-matrix lib-q-stark-mds lib-q-stark-merkle lib-q-stark-mersenne31 lib-q-stark-monty31 lib-q-stark-rayon lib-q-stark-symmetric lib-q-stark-util lib-q-stark-shake256 lib-q-stark-shake128 lib-q-stark-sha3-256 lib-q-poseidon lib-q-plonky-multilinear-util lib-q-plonky-keccak-air lib-q-plonky-lookup lib-q-plonky-uni-stark lib-q-plonky-batch-stark lib-q-plonky"
          ALL_CRATES="$CORE_CRATES $CRYPTO_CRATES $UTIL_CRATES $STARK_PLONKY_CRATES"
          
          # Check which critical packages were modified
          AFFECTED=""
          for crate in $ALL_CRATES; do
            if echo "$CHANGED_FILES" | grep -q "^$crate/"; then
              AFFECTED="$crate"
              break
            fi
          done
          
          # If no specific crate was modified, check if root files were changed
          if [ -z "$AFFECTED" ]; then
            if echo "$CHANGED_FILES" | grep -q "^lib-q/\|^Cargo\.toml\|^Cargo\.lock"; then
              # Workspace root or umbrella crate changed, test the main lib-q package
              AFFECTED="lib-q"
            else
              # Default to lib-q-core if no specific package is identified
              AFFECTED="lib-q-core"
            fi
          fi
          
          echo "package=$AFFECTED" >> $GITHUB_OUTPUT
          echo "Testing package: $AFFECTED"
          # Per-crate gates (ratcheted as coverage improves; see docs/coverage-scope.md).
          case "$AFFECTED" in
            lib-q-core) echo "coverage-threshold=78" >> $GITHUB_OUTPUT ;;
            *) echo "coverage-threshold=65" >> $GITHUB_OUTPUT ;;
          esac
      
      - name: Run coverage tests
        uses: ./.github/actions/rust-test
        with:
          features: ${{ steps.affected-packages.outputs.package == 'lib-q' && 'all-algorithms' || (steps.affected-packages.outputs.package == 'lib-q-kem' && 'std,alloc,ml-kem,hqc' || (steps.affected-packages.outputs.package == 'lib-q-ml-kem' && 'std,deterministic' || '')) }}
          run-coverage: "true"
          coverage-threshold: ${{ steps.affected-packages.outputs.coverage-threshold }}
          package: ${{ steps.affected-packages.outputs.package }}
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/

  # WASM compatibility check
  wasm-check:
    name: WASM Compatibility
    needs: core-validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      
      - name: Build WASM
        uses: ./.github/actions/wasm-build
        with:
          working-directory: lib-q
          features: "wasm,all-algorithms"
          targets: "web,nodejs"

  # Documentation validation
  docs-validation:
    name: Documentation Validation
    needs: core-validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      
      - name: Check documentation completeness
        run: |
          # Check that all public APIs are documented
          cargo doc --all-features --no-deps --document-private-items
          
          # Check for missing documentation
          MISSING_DOCS=$(cargo doc --all-features --no-deps 2>&1 | grep -c "missing documentation" || true)
          if [ $MISSING_DOCS -gt 0 ]; then
            echo "⚠️  WARNING: $MISSING_DOCS items missing documentation"
          else
            echo "✅ All public APIs are documented"
          fi
      
      - name: Check README examples
        run: |
          # Verify that README examples compile
          cargo check --examples --package lib-q --features "all-algorithms"
          echo "✅ README examples compile successfully"

      - name: Build and run lib-q-examples
        run: |
          cargo build -p lib-q-examples --examples
          cargo run -p lib-q-examples --example ml_dsa_working_no_std
          echo "✅ lib-q-examples build and ML-DSA example run successfully"

  # PR summary and reporting - runs after all other jobs
  pr-summary:
    name: PR Summary
    needs: [core-validation, security-validation, test-coverage, wasm-check, docs-validation]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate PR summary
        run: |
          echo "# 🔍 Pull Request Summary" > pr-summary.md
          echo "Generated: $(date)" >> pr-summary.md
          echo "" >> pr-summary.md
          echo "## 📋 Validation Results" >> pr-summary.md
          echo "- Core Validation: ${{ needs.core-validation.result }}" >> pr-summary.md
          echo "- Security Validation: ${{ needs.security-validation.result }}" >> pr-summary.md
          echo "- Test Coverage: ${{ needs.test-coverage.result }}" >> pr-summary.md
          echo "- WASM Compatibility: ${{ needs.wasm-check.result }}" >> pr-summary.md
          echo "- Documentation: ${{ needs.docs-validation.result }}" >> pr-summary.md
          echo "" >> pr-summary.md
          
          # Determine overall status
          if [[ "${{ needs.core-validation.result }}" == "success" ]] && \
             [[ "${{ needs.security-validation.result }}" == "success" ]] && \
             [[ "${{ needs.test-coverage.result }}" == "success" ]]; then
            echo "## ✅ Overall Status: PASSED" >> pr-summary.md
          else
            echo "## ❌ Overall Status: FAILED" >> pr-summary.md
          fi
          
          echo "" >> pr-summary.md
          echo "## 🔒 Security Checklist" >> pr-summary.md
          echo "- [ ] No classical cryptographic algorithms" >> pr-summary.md
          echo "- [ ] Only SHA-3 family hash functions" >> pr-summary.md
          echo "- [ ] Constant-time operations" >> pr-summary.md
          echo "- [ ] Proper memory zeroization" >> pr-summary.md
          echo "- [ ] Input validation" >> pr-summary.md
          echo "- [ ] Error handling" >> pr-summary.md
          echo "" >> pr-summary.md
          echo "## 📝 Review Notes" >> pr-summary.md
          echo "Please review the security implications of this change carefully." >> pr-summary.md
          echo "All cryptographic changes require security team review." >> pr-summary.md
      
      - name: Upload PR summary
        uses: actions/upload-artifact@v7
        with:
          name: pr-summary
          path: pr-summary.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          NEEDS: ${{ toJSON(needs) }}
        with:
          script: |
            try {
              const fs = require('fs');
              const summary = fs.readFileSync('pr-summary.md', 'utf8');
              const needs = JSON.parse(process.env.NEEDS || '{}');

              const criticalJobs = [
                'core-validation',
                'security-validation',
                'test-coverage'
              ];

              let shouldApprove = true;
              for (const job of criticalJobs) {
                if (needs[job]?.result !== 'success') {
                  shouldApprove = false;
                  break;
                }
              }
              
              let commentBody = summary;
              if (shouldApprove) {
                commentBody += '\n\n---\n\n✅ **Automated validation passed!** This PR is ready for review.';
              } else {
                commentBody += '\n\n---\n\n❌ **Automated validation failed!** Please address the issues above before merging.';
              }
              
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
              
              console.log('✅ PR summary posted successfully');
            } catch (error) {
              console.error('❌ Failed to post PR summary:', error.message);
              console.log('📋 PR summary is available as an artifact');
              // Don't fail the workflow if commenting fails
            }
