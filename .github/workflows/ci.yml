name: CI

# Pull requests: core checks, feature test matrix, WASM, algorithm crates, integration, ML-KEM,
# ML-DSA targeted tests. Push to main/develop, weekly schedule, and workflow_dispatch also run
# heavier jobs (benchmarks, cross-OS builds, valgrind, HQC SIMD debug, full ML-DSA audit script,
# ZKP recursive) to keep CI minutes predictable on PRs.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
  # Full pipeline (including jobs gated off PRs) runs weekly for regression signal without slowing every PR.
  schedule:
    - cron: "0 5 * * 0"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Core validation pipeline - runs first and fastest
  core-validation:
    name: Core Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      cache-key: ${{ steps.cache-key.outputs.value }}
    steps:
      - uses: actions/checkout@v5
      
      - name: Generate cache key
        id: cache-key
        run: echo "value=${{ github.sha }}-${{ github.run_id }}" >> $GITHUB_OUTPUT
      
      - name: Core validation
        uses: ./.github/actions/rust-build
        with:
          run-security-audit: "true"
          run-format-check: "true"
          # Clippy runs once below (workspace, all features) to avoid compiling twice.
          run-clippy: "false"
          run-tests: "false"
          run-workspace-builds: "false"
          features: "all-algorithms"

      # Single workspace clippy pass (all crates, all optional code paths).
      - name: Clippy (workspace, all targets, all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Parallel test matrix - runs after core validation
  test-matrix:
    name: Test Matrix
    needs: core-validation
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "std"
            features: "std"
            package: ""
          - name: "all-algorithms"
            features: "std,all-algorithms"
            package: ""
          - name: "ml-kem"
            features: "std,ml-kem,rand"
            package: ""
            # Scoped: lib-q-ml-kem uses feature "random", not umbrella "rand" (separate cargo test via @).
            packages: "lib-q lib-q-kem lib-q-core lib-q-ml-kem@std,random"
          - name: "no_std"
            features: "no_std,getrandom"
            package: "lib-q-core"
          - name: "wasm"
            features: "std,wasm"
            package: ""
            packages: "lib-q lib-q-core"
          - name: "zkp"
            features: "std,zkp"
            package: ""
            packages: "lib-q lib-q-zkp"
          - name: "lib-q-kem"
            features: "ml-kem"
            package: "lib-q-kem"
          - name: "lib-q-ml-kem"
            features: "std"
            package: "lib-q-ml-kem"
          - name: "ml-dsa-fips"
            features: "std,fips-mode,mldsa44,mldsa65,mldsa87,acvp"
            package: "lib-q-ml-dsa"
          - name: "ml-dsa-hardened"
            features: "std,hardened-mode,mldsa44,mldsa65,mldsa87,zeroize,constant-time"
            package: "lib-q-ml-dsa"
          - name: "ml-dsa-cross-mode"
            features: "std,random,acvp,mldsa44,mldsa65,mldsa87"
            package: "lib-q-ml-dsa"
          - name: "lib-q-keccak no_std"
            features: "alloc"
            package: "lib-q-keccak"
          - name: "lib-q-random"
            features: "std,secure,zeroize"
            package: "lib-q-random"
          - name: "lib-q-random no_std"
            features: "no_std,getrandom"
            package: "lib-q-random"
          - name: "lib-q-random wasm"
            features: "wasm"
            package: "lib-q-random"
          - name: "lib-q-stark-rayon parallel"
            features: "parallel"
            package: "lib-q-stark-rayon"
          - name: "lib-q-stark-dft no_std"
            features: "alloc"
            package: "lib-q-stark-dft"
          - name: "lib-q-stark-dft parallel"
            features: "alloc,parallel"
            package: "lib-q-stark-dft"
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Run tests
        uses: ./.github/actions/rust-test
        with:
          features: ${{ matrix.features }}
          package: ${{ matrix.package }}
          packages: ${{ matrix.packages }}
          run-release-tests: "true"

  # ZKP recursive aggregation - full prove/aggregate/verify in release (slow test)
  zkp-recursive:
    name: ZKP Recursive Aggregation
    if: github.event_name != 'pull_request'
    needs: core-validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy, rust-src

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-zkp-recursive-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-zkp-recursive-

      - name: Run recursive aggregation test (release)
        run: |
          cargo clean --profile release-ci 2>/dev/null || true
          cargo test -p lib-q-zkp --profile release-ci --features "zkp,recursive-proofs-experimental,std" \
            --test aggregation_tests test_recursive_verifier_trace_satisfies_constraints_then_prove_verify \
            -- --test-threads=1

  # WASM validation - parallel with test matrix
  wasm-validation:
    name: WASM Validation
    needs: core-validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - working-directory: "lib-q"
            features: "wasm,all-algorithms,ml-kem"
            check-only: "false"
          - working-directory: "lib-q-kem"
            features: "wasm,ml-kem"
            check-only: "false"
          - working-directory: "lib-q-core"
            features: "wasm,ml-kem,rand"
            check-only: "false"
          - working-directory: "lib-q-zkp"
            features: "wasm,zkp"
            check-only: "true"
          - working-directory: "lib-q-romulus"
            features: ""
            check-only: "true"
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Build WASM
        uses: ./.github/actions/wasm-build
        with:
          working-directory: ${{ matrix.working-directory }}
          features: ${{ matrix.features }}
          targets: "web,nodejs"
          check-only: ${{ matrix.check-only }}

  # Romulus: pure no_std crypto core + registry wiring without forcing lib-q-romulus/std
  romulus-no-std-wasm:
    name: Romulus no_std / wasm32 smoke
    needs: core-validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: lib-q-romulus (stack-only, no alloc)
        run: |
          cargo check -p lib-q-romulus --no-default-features
          cargo check -p lib-q-romulus --no-default-features --target wasm32-unknown-unknown

      - name: lib-q-aead + romulus (alloc, no lib-q-aead default features)
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUSTFLAGS: '--cfg getrandom_backend="wasm_js" -C panic=abort'
        run: |
          cargo check -p lib-q-aead --no-default-features --features alloc,romulus
          cargo check -p lib-q-aead --no-default-features --features alloc,romulus --target wasm32-unknown-unknown

  # Cross-platform builds - parallel execution
  cross-platform:
    name: Cross-Platform Builds
    if: github.event_name != 'pull_request'
    needs: core-validation
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: "Linux x86_64"
            install-cross-compiler: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: "Linux ARM64"
            install-cross-compiler: true
            cross-compiler-packages: "gcc-aarch64-linux-gnu"
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            name: "Linux ARMv7"
            install-cross-compiler: true
            cross-compiler-packages: "gcc-arm-linux-gnueabihf"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: "Windows x86_64"
            install-cross-compiler: false
          - os: macos-latest
            target: x86_64-apple-darwin
            name: "macOS x86_64"
            install-cross-compiler: false
          - os: macos-latest
            target: aarch64-apple-darwin
            name: "macOS ARM64"
            install-cross-compiler: false

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rust-src

      - name: Install cross-compiler toolchains (Ubuntu)
        if: matrix.install-cross-compiler && runner.os == 'Linux'
        run: |
          echo "Installing cross-compiler toolchain for ${{ matrix.name }}"
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross-compiler-packages }}

          # Install additional dependencies for cross-compilation
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross
          elif [[ "${{ matrix.target }}" == "armv7-unknown-linux-gnueabihf" ]]; then
            sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf libc6-dev-armhf-cross
          fi

          # Verify installation - check different possible command names
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            echo "Verifying aarch64-linux-gnu-gcc installation..."
            if command -v aarch64-linux-gnu-gcc &> /dev/null; then
              aarch64-linux-gnu-gcc --version
              echo "✅ aarch64-linux-gnu-gcc found and working"
            else
              echo "❌ aarch64-linux-gnu-gcc not found in PATH"
              echo "Available gcc commands:"
              ls -la /usr/bin/*aarch64* 2>/dev/null || echo "No aarch64 commands found"
              exit 1
            fi
          elif [[ "${{ matrix.target }}" == "armv7-unknown-linux-gnueabihf" ]]; then
            echo "Verifying arm-linux-gnueabihf-gcc installation..."
            if command -v arm-linux-gnueabihf-gcc &> /dev/null; then
              arm-linux-gnueabihf-gcc --version
              echo "✅ arm-linux-gnueabihf-gcc found and working"
            else
              echo "❌ arm-linux-gnueabihf-gcc not found in PATH"
              echo "Available gcc commands:"
              ls -la /usr/bin/*arm* 2>/dev/null || echo "No arm commands found"
              exit 1
            fi
          fi
          echo "✅ Cross-compiler toolchain verified"

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-

      - name: Build for target (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "Building for ${{ matrix.name }} (${{ matrix.target }}) on Unix-like system"
          # Build with security-focused flags
          RUSTFLAGS="-C target-cpu=generic -C opt-level=3 -C overflow-checks=on" \
          cargo build --target ${{ matrix.target }} --features "all-algorithms" --release

      - name: Build for target (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "Building for ${{ matrix.name }} (${{ matrix.target }}) on Windows"
          # Build with security-focused flags using PowerShell syntax
          $env:RUSTFLAGS = "-C target-cpu=generic -C opt-level=3 -C overflow-checks=on"
          cargo build --target ${{ matrix.target }} --features "all-algorithms" --release

      - name: Verify cross-compilation integrity (Unix)
        if: matrix.install-cross-compiler && runner.os != 'Windows'
        run: |
          echo "Verifying cross-compilation integrity for ${{ matrix.name }} on Unix-like system"

          # Debug: List all files in the target directory
          echo "Files in target/${{ matrix.target }}/release/:"
          ls -la target/${{ matrix.target }}/release/ || echo "Directory not found"

          # Check if the expected library file exists (main workspace library)
          if [[ ! -f "target/${{ matrix.target }}/release/liblibq.so" ]]; then
            echo "❌ Expected library file not found: target/${{ matrix.target }}/release/liblibq.so"
            echo "Available files:"
            ls -la target/${{ matrix.target }}/release/ 2>/dev/null || echo "No files found"
            echo "This suggests the cross-compilation may not have produced the expected output."
            exit 1
          fi

          # Debug: Show file command output
          echo "File command output:"
          file target/${{ matrix.target }}/release/liblibq.so || echo "File command failed"

          # Check that the binary was compiled for the correct architecture
          if [[ "${{ matrix.target }}" == aarch64-* ]]; then
            echo "Checking for ARM aarch64 architecture..."
            if file target/${{ matrix.target }}/release/liblibq.so | grep -q "ARM aarch64"; then
              echo "✅ ARM aarch64 architecture confirmed"
            else
              echo "❌ ARM aarch64 architecture NOT found"
              echo "File command output was:"
              file target/${{ matrix.target }}/release/liblibq.so || echo "File command failed"
              exit 1
            fi
          elif [[ "${{ matrix.target }}" == armv7-* ]]; then
            echo "Checking for ARM architecture..."
            if file target/${{ matrix.target }}/release/liblibq.so | grep -q "ARM"; then
              echo "✅ ARM architecture confirmed"
            else
              echo "❌ ARM architecture NOT found"
              echo "File command output was:"
              file target/${{ matrix.target }}/release/liblibq.so || echo "File command failed"
              exit 1
            fi
          fi
          echo "✅ Cross-compilation integrity verified"

      - name: Verify cross-compilation integrity (Windows)
        if: matrix.install-cross-compiler && runner.os == 'Windows'
        run: |
          echo "Verifying cross-compilation integrity for ${{ matrix.name }} on Windows"
          # On Windows, we skip detailed architecture verification since cross-compilation
          # from Windows to Linux is limited, but we can check if the build succeeded
          if [[ "${{ matrix.target }}" == aarch64-* ]] || [[ "${{ matrix.target }}" == armv7-* ]]; then
            echo "Cross-compilation from Windows to ARM targets completed"
            echo "Note: Detailed architecture verification is limited on Windows"
          fi
          echo "✅ Cross-compilation integrity verified"

      - name: Build cross-compilation tests (without execution)
        if: matrix.install-cross-compiler && (matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'armv7-unknown-linux-gnueabihf')
        run: |
          echo "Building cross-compilation tests for ${{ matrix.name }} (execution skipped)"
          # Build tests for cross-compilation target to ensure they compile correctly
          # We skip execution since we can't run ARM binaries on x86_64 hosts
          cargo clean --profile release-ci 2>/dev/null || true
          cargo test -p lib-q-keccak --target ${{ matrix.target }} --features std --profile release-ci --no-run
          echo "✅ Cross-compilation tests built successfully (execution not possible on x86_64 host)"

  # Performance and benchmarks - runs after core validation
  performance:
    name: Performance & Benchmarks
    if: github.event_name != 'pull_request'
    needs: core-validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rust-src

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-bench-
      
      - name: Run benchmarks
        run: cargo bench --features "all-algorithms" --verbose

      - name: Run Saturnin SIMD benchmarks
        run: |
          echo "Running Saturnin scalar vs AVX2 benchmarks..."
          cargo bench -p lib-q-saturnin --features "alloc,aead,block-cipher,hash,stream,simd-avx2" --bench saturnin_criterion_benches --verbose
          echo "✅ Saturnin SIMD benchmarks completed"
      
      - name: Run RNG performance benchmarks
        run: |
          echo "Running RNG-specific performance benchmarks..."
          cd lib-q-random
          cargo bench --features "std,secure,zeroize" --verbose
          echo "✅ RNG performance benchmarks completed"
      
      - name: Run HQC SIMD benchmarks
        run: |
          echo "Running HQC SIMD performance benchmarks..."
          cd lib-q-hqc
          cargo bench --features "alloc,hqc128,simd-avx2" --bench simd_benchmarks --verbose
          echo "✅ HQC SIMD benchmarks completed"

      - name: Run lib-q-zkp STARK benchmarks
        run: |
          echo "Running lib-q-zkp STARK arithmetic benchmarks..."
          cargo bench -p lib-q-zkp --features "zkp,std" --bench stark_arithmetic_bench --verbose
          echo "✅ lib-q-zkp STARK benchmarks completed"

  # Documentation generation - lightweight job
  documentation:
    name: Documentation
    needs: core-validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rust-src

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-docs-
      
      - name: Generate documentation
        run: |
          cargo doc --all-features --no-deps
          cargo doc --all-features --no-deps --document-private-items

  # Specialized algorithm testing - parallel execution
  algorithm-tests:
    name: Algorithm Tests
    needs: core-validation
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Keccak"
            action: test-keccak
            working-directory: lib-q-keccak
            features: "asm,simd"
            rust-version: "nightly"
            run-benchmarks: "true"
            test-algorithms: ""
          - name: "SHA3"
            action: test-sha3
            working-directory: lib-q-sha3
            features: "alloc,oid"
            rust-version: "stable"
            test-algorithms: "sha3-224,sha3-256,sha3-384,sha3-512,keccak224,keccak256,keccak384,keccak512,turboshake128,turboshake256"
            run-benchmarks: "false"
          - name: "K12"
            action: test-k12
            working-directory: lib-q-hash
            features: "alloc,oid,getrandom"
            rust-version: "stable"
            run-benchmarks: "false"
            test-algorithms: "kangarootwelve"
          - name: "Saturnin"
            action: test-saturnin
            working-directory: lib-q-saturnin
            features: "aead,aead-short,block-cipher,hash,stream,alloc,simd-avx2"
            rust-version: "stable"
            run-benchmarks: "false"
            test-algorithms: "aead,aead-short,block-cipher,hash,stream"
          - name: "FN-DSA"
            action: test-fn-dsa
            working-directory: lib-q-fn-dsa
            features: "std,rand"
            rust-version: "stable"
            run-benchmarks: "false"
            run-security-tests: "true"
            run-constant-time: "true"
          - name: "RNG"
            action: test-rng
            working-directory: lib-q-random
            features: "std,secure,zeroize"
            rust-version: "stable"
            run-benchmarks: "true"
            run-entropy-validation: "true"
            run-security-tests: "true"
            run-constant-time: "true"
            test-algorithms: "secure,deterministic,hardware,user"
          - name: "CB-KEM"
            action: test-cb-kem
            working-directory: lib-q-cb-kem
            features: "cbkem348864"
            rust-version: "stable"
            run-benchmarks: "true"
            run-security-tests: "true"
            run-constant-time: "true"
            test-algorithms: "cbkem348864,cbkem460896,cbkem6688128,cbkem6960119,cbkem8192128,cbkem8192128f"
          - name: "SLH-DSA"
            action: test-slh-dsa
            working-directory: lib-q-slh-dsa
            features: "alloc"
            rust-version: "stable"
            run-benchmarks: "false"
            run-security-tests: "true"
            run-constant-time: "true"
            test-algorithms: "sha2-128f,sha2-192f,sha2-256f,shake128f,shake192f,shake256f"
          - name: "HPKE"
            action: test-hpke
            working-directory: lib-q-hpke
            features: "ml-kem,saturnin,shake256,hash,secure-rng"
            rust-version: "stable"
            run-benchmarks: "false"
            run-security-tests: "true"
            run-constant-time: "true"
            test-algorithms: "ml-kem512,saturnin256,shake256"
          - name: "HQC"
            action: test-hqc
            working-directory: lib-q-hqc
            features: "alloc,hqc128,simd-avx2"
            rust-version: "stable"
            run-benchmarks: "false"  # Changed from "true" - benchmarks run in performance job
            run-security-tests: "true"
            run-simd-tests: "true"
            test-algorithms: "hqc128,hqc192,hqc256"
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Run algorithm tests
        uses: ./.github/actions/test-keccak
        if: matrix.action == 'test-keccak'
        with:
          working-directory: ${{ matrix.working-directory }}
          features: ${{ matrix.features }}
          rust-version: ${{ matrix.rust-version }}
          run-benchmarks: ${{ matrix.run-benchmarks }}
          test-algorithms: ${{ matrix.test-algorithms }}
      
      - name: Run SHA3 tests
        uses: ./.github/actions/test-sha3
        if: matrix.action == 'test-sha3'
        with:
          working-directory: ${{ matrix.working-directory }}
          features: ${{ matrix.features }}
          rust-version: ${{ matrix.rust-version }}
          run-benchmarks: ${{ matrix.run-benchmarks }}
          test-algorithms: ${{ matrix.test-algorithms }}
      
      - name: Run K12 tests
        uses: ./.github/actions/test-k12
        if: matrix.action == 'test-k12'
        with:
          working-directory: ${{ matrix.working-directory }}
          features: ${{ matrix.features }}
          rust-version: ${{ matrix.rust-version }}
          run-benchmarks: ${{ matrix.run-benchmarks }}
          test-algorithms: ${{ matrix.test-algorithms }}
      
      - name: Run Saturnin tests
        uses: ./.github/actions/test-saturnin
        if: matrix.action == 'test-saturnin'
        with:
          working-directory: ${{ matrix.working-directory }}
          features: ${{ matrix.features }}
          rust-version: ${{ matrix.rust-version }}
          run-benchmarks: ${{ matrix.run-benchmarks }}
          test-algorithms: ${{ matrix.test-algorithms }}
      
      - name: Run FN-DSA tests
        uses: ./.github/actions/test-fn-dsa
        if: matrix.action == 'test-fn-dsa'
        with:
          working-directory: ${{ matrix.working-directory }}
          features: ${{ matrix.features }}
          rust-version: ${{ matrix.rust-version }}
          run-benchmarks: ${{ matrix.run-benchmarks }}
          run-security-tests: ${{ matrix.run-security-tests }}
          run-constant-time: ${{ matrix.run-constant-time }}
      
      - name: Run RNG tests
        uses: ./.github/actions/test-rng
        if: matrix.action == 'test-rng'
        with:
          working-directory: ${{ matrix.working-directory }}
          features: ${{ matrix.features }}
          rust-version: ${{ matrix.rust-version }}
          run-benchmarks: ${{ matrix.run-benchmarks }}
          run-entropy-validation: ${{ matrix.run-entropy-validation }}
          run-security-tests: ${{ matrix.run-security-tests }}
          run-constant-time: ${{ matrix.run-constant-time }}
          test-algorithms: ${{ matrix.test-algorithms }}
      
      - name: Run CB-KEM tests
        uses: ./.github/actions/test-cb-kem
        if: matrix.action == 'test-cb-kem'
        with:
          working-directory: ${{ matrix.working-directory }}
          features: ${{ matrix.features }}
          rust-version: ${{ matrix.rust-version }}
          run-benchmarks: ${{ matrix.run-benchmarks }}
          run-security-tests: ${{ matrix.run-security-tests }}
          run-constant-time: ${{ matrix.run-constant-time }}
          test-algorithms: ${{ matrix.test-algorithms }}
      
      - name: Run SLH-DSA tests
        uses: ./.github/actions/test-slh-dsa
        if: matrix.action == 'test-slh-dsa'
        with:
          working-directory: ${{ matrix.working-directory }}
          features: ${{ matrix.features }}
          rust-version: ${{ matrix.rust-version }}
          # Full Criterion runs are skipped on pull requests to keep algorithm-tests within its time budget; they still run on main/schedule (performance job also benches the workspace)
          run-benchmarks: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
          run-security-tests: ${{ matrix.run-security-tests }}
          run-constant-time: ${{ matrix.run-constant-time }}
          test-algorithms: ${{ matrix.test-algorithms }}
      
      - name: Run HPKE tests
        uses: ./.github/actions/test-hpke
        if: matrix.action == 'test-hpke'
        with:
          working-directory: ${{ matrix.working-directory }}
          features: ${{ matrix.features }}
          rust-version: ${{ matrix.rust-version }}
          run-benchmarks: ${{ matrix.run-benchmarks }}
          run-security-tests: ${{ matrix.run-security-tests }}
          run-constant-time: ${{ matrix.run-constant-time }}
          test-algorithms: ${{ matrix.test-algorithms }}

      - name: Run HQC tests
        uses: ./.github/actions/test-hqc
        if: matrix.action == 'test-hqc'
        with:
          working-directory: ${{ matrix.working-directory }}
          features: ${{ matrix.features }}
          rust-version: ${{ matrix.rust-version }}
          run-benchmarks: ${{ matrix.run-benchmarks }}
          run-security-tests: ${{ matrix.run-security-tests }}
          run-simd-tests: ${{ matrix.run-simd-tests }}
          test-algorithms: ${{ matrix.test-algorithms }}

  # SIMD debug verification for HQC
  simd-debug-tests:
    name: SIMD Debug Verification
    if: github.event_name != 'pull_request'
    needs: core-validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-simd-debug-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-simd-debug-
      
      - name: Run SIMD unit tests
        run: |
          cd lib-q-hqc
          RUST_SIMD_DEBUG=1 cargo test --features "simd-avx2,alloc,hqc128" \
            simd_unit_tests --verbose
      
      - name: Run cross-implementation validation
        run: |
          cd lib-q-hqc
          cargo test --features "simd-avx2,alloc,hqc128" cross_implementation --verbose

  # ML-DSA compliance testing
  ml-dsa-compliance:
    name: ML-DSA Compliance
    needs: core-validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rust-src

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mldsa-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-mldsa-

      # PRs: targeted tests only (full audit script is slow and duplicates other jobs).
      - name: ML-DSA focused validation (pull requests)
        if: github.event_name == 'pull_request'
        working-directory: lib-q-ml-dsa
        run: |
          cargo test --features "fips-mode,acvp" --test nistkats
          cargo test --features "simd256,random,acvp" --test determinism
          cargo test --no-default-features --features "std,mldsa44" \
            --test interoperability_tests --test wire_format_tests
          cargo test --features "random,mldsa44" \
            --test interoperability_tests --test wire_format_tests
          cargo test --features "hardened-mode,mldsa44" \
            --test interoperability_tests --test wire_format_tests
          cargo test --test wire_format_tests test_against_saved_interop_vectors

      # Push / schedule / manual: full script (tests, clippy, audit from workspace root, etc.).
      - name: ML-DSA full security audit
        if: github.event_name != 'pull_request'
        run: |
          cd lib-q-ml-dsa
          chmod +x scripts/security_audit.sh
          ./scripts/security_audit.sh

  # ML-KEM specific testing
  ml-kem-tests:
    name: ML-KEM Tests
    needs: core-validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rust-src

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mlkem-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-mlkem-
      
      - name: Test ML-KEM standalone
        run: |
          cd lib-q-ml-kem
          cargo test --verbose
      
      - name: Test ML-KEM integration
        run: |
          cd lib-q-core
          cargo test --features "ml-kem,rand" --verbose
          cargo build --profile dev-no-std --no-default-features --features "no_std,getrandom,no_std_panic_handler"
      
      - name: Test ML-KEM with lib-q-kem
        run: |
          cd lib-q-kem
          cargo test --features "ml-kem" --verbose

  # Constant-time verification - critical for crypto
  constant-time:
    name: Constant-Time Verification
    if: github.event_name != 'pull_request'
    needs: core-validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rust-src

      - name: Install valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind
      
      - name: Install cargo-valgrind
        run: cargo install cargo-valgrind
      
      - name: Run constant-time tests
        run: |
          echo "Running constant-time tests for lib-q-sha3..."
          cargo test --test constant_time -p lib-q-sha3 || echo "⚠️  constant_time test not available for lib-q-sha3"
          echo "Running constant-time tests for lib-q-k12..."
          cargo test --test constant_time -p lib-q-k12 || echo "⚠️  constant_time test not available for lib-q-k12"

  # Integration tests - runs after algorithm tests
  integration-tests:
    name: Integration Tests
    needs: [algorithm-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy
      
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-integration-
      
      - name: Run hash integration tests
        run: |
          echo "Running hash algorithm integration tests..."
          cargo test -p lib-q --test hash_integration_tests --features "all-algorithms" --verbose
          echo "✅ Hash integration tests completed successfully"
      
      - name: Run unified API tests
        run: |
          echo "Running unified API tests..."
          cargo test --package lib-q --features "all-algorithms" --verbose
          echo "✅ Unified API tests completed successfully"

  # Final validation - runs after all other jobs
  final-validation:
    name: Final Validation
    needs: [test-matrix, wasm-validation, romulus-no-std-wasm, zkp-recursive, cross-platform, performance, documentation, algorithm-tests, simd-debug-tests, ml-dsa-compliance, ml-kem-tests, constant-time, integration-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check job status
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "All jobs completed. Check individual job results above." >> $GITHUB_STEP_SUMMARY
          
          # Check if any required jobs failed
          if [[ "${{ needs.test-matrix.result }}" == "failure" ]] || \
             [[ "${{ needs.wasm-validation.result }}" == "failure" ]] || \
             [[ "${{ needs.romulus-no-std-wasm.result }}" == "failure" ]] || \
             [[ "${{ needs.ml-dsa-compliance.result }}" == "failure" ]] || \
             [[ "${{ needs.constant-time.result }}" == "failure" ]] || \
             [[ "${{ needs.integration-tests.result }}" == "failure" ]]; then
            echo "❌ Critical jobs failed. Please review the failures above." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          echo "✅ All critical jobs passed successfully!" >> $GITHUB_STEP_SUMMARY


