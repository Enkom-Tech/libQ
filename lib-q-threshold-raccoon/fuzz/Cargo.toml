[package]
name = "lib-q-threshold-raccoon-fuzz"
version = "0.0.9"
edition = "2024"
rust-version = "1.96.0"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
lib-q-threshold-raccoon = { path = "..", default-features = false, features = ["std", "random"] }
libfuzzer-sys = "0.4.12"

[[bin]]
name = "signature_decode"
path = "fuzz_targets/signature_decode.rs"
test = false
doc = false
bench = false

[workspace]
members = ["."]
resolver = "3"
