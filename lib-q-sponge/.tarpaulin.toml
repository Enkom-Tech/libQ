[all]
# Only include the lib-q-sponge crate in coverage
packages = ["lib-q-sponge"]

# Include only our source files
include-files = [
    "src/lib.rs"
]

# Exclude all reference implementations and external code
exclude-files = [
    "../reference/*",
    "../lib-q-keccak/*",
    "../lib-q-ascon/*",
    "../lib-q-ml-dsa/*",
    "../lib-q-ml-kem/*",
    "../lib-q-k12/*",
    "../lib-q-sha3/*",
    "../lib-q-hpke/*",
    "../lib-q-hash/*",
    "../lib-q-core/*",
    "../lib-q-intrinsics/*"
]

# Run with default features
# features = "all"

# Fail if coverage is below threshold
fail-under = 80.0

# Output formats
output-dir = "coverage"
out = ["Html", "Xml"]

# Don't count test code in coverage metrics
ignore-tests = true

# Don't count panics in coverage metrics
ignore-panics = true
