[package]
name = "lib-q-sig"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
readme.workspace = true
description = "Post-quantum Digital Signatures for lib-Q"
keywords = ["cryptography", "post-quantum", "signatures", "digital-signatures"]
categories = ["cryptography"]

[dependencies]
lib-q-core = { path = "../lib-q-core" }
lib-q-ml-dsa = { path = "../lib-q-ml-dsa", optional = true }
lib-q-fn-dsa = { path = "../lib-q-fn-dsa", optional = true }
lib-q-slh-dsa = { path = "../lib-q-slh-dsa", optional = true }
rand_core = { version = "0.9.3", optional = true }
rand = { version = "0.9.2", optional = true }
sha2 = { version = "0.11.0-rc.2", optional = true, default-features = false }

# WASM support
wasm-bindgen = { version = "0.2.104", optional = true, features = ["serde-serialize"] }
js-sys = { version = "0.3.81", optional = true }
serde-wasm-bindgen = { version = "0.6.5", optional = true }
serde_json = { version = "1.0.145", optional = true }

[features]
default = ["alloc", "ml-dsa", "std"]
ml-dsa = ["lib-q-ml-dsa"]
slh-dsa = ["lib-q-slh-dsa", "rand_core", "sha2"]
slh-dsa-std = ["slh-dsa", "rand"]
slh-dsa-wasm = ["slh-dsa", "wasm-bindgen", "js-sys", "serde-wasm-bindgen", "serde_json", "lib-q-core/wasm_getrandom"]
fn-dsa = ["lib-q-fn-dsa"]
std = ["alloc"]
alloc = []
no_std = []
wasm = ["wasm-bindgen", "js-sys", "serde-wasm-bindgen", "serde_json"]

[lib]
name = "lib_q_sig"
path = "src/lib.rs"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dev-dependencies]
criterion = { version = "0.7.0", features = ["html_reports"] }

[[bench]]
name = "signature_benchmarks"
harness = false
required-features = ["std"]

[[bench]]
name = "integration_benchmarks"
harness = false
required-features = ["std"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }