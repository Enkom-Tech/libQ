[package]
name = "lib-q-stark-interpolation"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "Tools for performing Lagrange interpolation over two-adic subgroups and their cosets."
license.workspace = true
repository.workspace = true
readme.workspace = true

[dependencies]
lib-q-stark-field = { path = "../lib-q-stark-field", version = "0.0.4" }
lib-q-stark-matrix = { path = "../lib-q-stark-matrix", version = "0.0.4" }
lib-q-stark-rayon = { path = "../lib-q-stark-rayon", version = "0.0.4" }
lib-q-stark-util = { path = "../lib-q-stark-util", version = "0.0.4" }

[dev-dependencies]
lib-q-stark-mersenne31 = { path = "../lib-q-stark-mersenne31", version = "0.0.4" }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }
