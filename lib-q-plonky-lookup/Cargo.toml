[package]
name = "lib-q-plonky-lookup"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "Lookup argument tables for ZKP circuit gates in lib-Q"
license.workspace = true
repository.workspace = true
readme.workspace = true
keywords = ["cryptography", "post-quantum", "zkp", "lib-q"]
categories = ["cryptography"]


[package.metadata.cargo-machete]
ignored = [
    "itertools",
    "lib-q-stark-util",
]
[lib]
name = "lib_q_plonky_lookup"
path = "src/lib.rs"
crate-type = ["rlib"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }

[dependencies]
lib-q-stark-air = { path = "../lib-q-stark-air", version = "0.0.9" }
lib-q-stark-field = { path = "../lib-q-stark-field", version = "0.0.9" }
lib-q-stark-matrix = { path = "../lib-q-stark-matrix", version = "0.0.9" }
lib-q-stark-util = { path = "../lib-q-stark-util", version = "0.0.9" }
itertools = { workspace = true }
serde = { workspace = true, features = ["derive", "alloc"], default-features = false }
tracing = { workspace = true }

[dev-dependencies]
lib-q-stark-mersenne31 = { path = "../lib-q-stark-mersenne31", version = "0.0.9" }

[features]
default = ["alloc"]
std = ["alloc"]
alloc = []
no_std = []
