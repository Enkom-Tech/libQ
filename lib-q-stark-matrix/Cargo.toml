[package]
name = "lib-q-stark-matrix"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "A matrix library providing common matrix operations and traits for finite field elements."
license.workspace = true
repository.workspace = true
readme.workspace = true

[dependencies]
lib-q-stark-field = { path = "../lib-q-stark-field", version = "0.0.9" }
lib-q-stark-rayon = { path = "../lib-q-stark-rayon", version = "0.0.9" }
lib-q-stark-util = { path = "../lib-q-stark-util", version = "0.0.9" }

itertools = { workspace = true }
rand = { workspace = true, default-features = false }
serde = { workspace = true, features = ["derive"], default-features = false }
tracing = { workspace = true }
transpose = { workspace = true }
zeroize = { workspace = true, features = ["derive"], default-features = false }

[features]
default = ["alloc"]
std = ["alloc"]
alloc = []
no_std = []

[dev-dependencies]
# RNG instances for tests come from lib-q-random (the regular `rand` dep above is only the no_std
# `Distribution`/`StandardUniform` sampling framework used by `DenseMatrix::rand`).
lib-q-random = { path = "../lib-q-random", version = "0.0.9" }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
criterion = { workspace = true }

[lib]
bench = false

[[bench]]
name = "transpose_benchmark"
path = "benches/transpose_benchmark.rs"
harness = false

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }
