[package]
name = "lib-q-zkp-fuzz"
version = "0.0.5"
edition = "2024"
rust-version = "1.96.0"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
lib-q-stark = { path = "../../lib-q-stark", version = "0.0.5" }
lib-q-stark-field = { path = "../../lib-q-stark-field", version = "0.0.5" }
lib-q-stark-mersenne31 = { path = "../../lib-q-stark-mersenne31", version = "0.0.5" }
lib-q-zkp = { path = "..", features = ["zkp", "std"] }
libfuzzer-sys = "0.4.12"
postcard = { version = "1.1.3", default-features = false, features = ["alloc"] }

[[bin]]
name = "zkp_verify_bytes"
path = "fuzz_targets/zkp_verify_bytes.rs"
test = false
doc = false
bench = false

[[bin]]
name = "zkp_prove_arithmetic"
path = "fuzz_targets/zkp_prove_arithmetic.rs"
test = false
doc = false
bench = false

[[bin]]
name = "recovery_zk_decode"
path = "fuzz_targets/recovery_zk_decode.rs"
test = false
doc = false
bench = false

[workspace]
members = ["."]
resolver = "3"
