[package]
name = "lib-q-zkp"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "Post-quantum Zero-Knowledge Proofs for lib-Q"
license.workspace = true
repository.workspace = true
keywords = ["cryptography", "post-quantum", "zkp", "zero-knowledge-proofs"]
categories = ["cryptography"]
readme.workspace = true
autobenches = false

[dependencies]
lib-q-core = { path = "../lib-q-core", default-features = false, features = ["alloc"] }
lib-q-stark = { path = "../lib-q-stark", default-features = false, features = ["alloc"] }
lib-q-stark-air = { path = "../lib-q-stark-air" }
lib-q-stark-field = { path = "../lib-q-stark-field" }
lib-q-stark-mersenne31 = { path = "../lib-q-stark-mersenne31" }
lib-q-stark-shake256 = { path = "../lib-q-stark-shake256" }
lib-q-stark-matrix = { path = "../lib-q-stark-matrix" }
lib-q-stark-commit = { path = "../lib-q-stark-commit" }
lib-q-stark-challenger = { path = "../lib-q-stark-challenger" }
lib-q-stark-fri = { path = "../lib-q-stark-fri" }
lib-q-stark-merkle = { path = "../lib-q-stark-merkle" }
lib-q-stark-symmetric = { path = "../lib-q-stark-symmetric" }
lib-q-stark-rayon = { path = "../lib-q-stark-rayon", optional = true }
lib-q-sha3 = { path = "../lib-q-sha3" }
lib-q-poseidon = { path = "../lib-q-poseidon", default-features = false, features = ["alloc"] }
digest = { workspace = true }
lib-q-random = { path = "../lib-q-random", default-features = false }
postcard = { workspace = true, features = ["alloc"] }
serde = { workspace = true, features = ["derive", "alloc"], default-features = false }
zeroize = { workspace = true, default-features = false }
lib-q-plonky = { path = "../lib-q-plonky", optional = true }

[features]
default = ["alloc", "zkp"]
std = ["alloc", "lib-q-core/std", "lib-q-stark/std"]
alloc = []
no_std = []
wasm = ["alloc", "lib-q-core/wasm"]
parallel = ["lib-q-stark-rayon", "lib-q-stark/parallel"]
zkp = []
stark = []
plonky = ["dep:lib-q-plonky", "lib-q-plonky/full"]
plonky-keccak-air = ["dep:lib-q-plonky", "lib-q-plonky/keccak-air"]
plonky-lookup = ["dep:lib-q-plonky", "lib-q-plonky/lookup"]
plonky-uni-stark = ["dep:lib-q-plonky", "lib-q-plonky/uni-stark"]
plonky-batch-stark = ["dep:lib-q-plonky", "lib-q-plonky/batch-stark"]
recursive-proofs-experimental = ["lib-q-stark-merkle/poseidon"]
# Enable verbose trace/constraint logging in recursive verifier (off by default).
trace-debug = []

[lib]
name = "lib_q_zkp"
path = "src/lib.rs"

[[bench]]
name = "stark_arithmetic_bench"
harness = false
required-features = ["zkp"]

[[bench]]
name = "zkp_benchmarks"
harness = false
required-features = ["zkp"]

[dev-dependencies]
criterion = { workspace = true }
lib-q-ml-kem = { path = "../lib-q-ml-kem" }
lib-q-random = { path = "../lib-q-random", features = ["std"] }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }