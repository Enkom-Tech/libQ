[package]
name = "lib-q-sha2"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
readme.workspace = true
description = "Pure Rust implementation of SHA-2 hash functions for lib-Q"
keywords = ["crypto", "sha2", "hash", "digest", "lib-q"]
categories = ["cryptography", "no-std"]
rust-version = "1.89"
documentation = "https://docs.rs/lib-q-sha2"

[dependencies]
lib-q-core = { path = "../lib-q-core" }
digest = "0.11.0-rc.2"
cfg-if = "1.0"
cpufeatures = "0.2.17"
zeroize = { version = "1.8.1", optional = true }

[dev-dependencies]
digest = { version = "0.11.0-rc.2", features = ["dev"] }
blobby = "0.4.0-pre.0"
hex-literal = "1.0.0"
base16ct = { version = "0.3.0", features = ["alloc"] }

[features]
default = ["alloc", "oid", "zeroize"]
alloc = ["digest/alloc"]
std = ["alloc"]
oid = ["digest/oid"] # Enable OID support.
zeroize = ["dep:zeroize", "digest/zeroize"]
asm = [] # Enable assembly optimizations
simd = [] # Enable SIMD optimizations

[lib]
name = "lib_q_sha2"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
    'cfg(aarch64)',
    'cfg(x86_64)',
    'cfg(sha2_backend, values("soft", "soft-compact", "riscv-zknh", "riscv-zknh-compact"))',
] }
