[package]
name = "lib-q-plonky-multilinear-util"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "Multilinear polynomial utilities for ZKP systems in lib-Q"
license.workspace = true
repository.workspace = true
readme.workspace = true
keywords = ["cryptography", "post-quantum", "zkp", "lib-q"]
categories = ["cryptography"]

[lib]
name = "lib_q_plonky_multilinear_util"
path = "src/lib.rs"
crate-type = ["rlib"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }

[dependencies]
lib-q-stark-field = { path = "../lib-q-stark-field", version = "0.0.2" }
lib-q-stark-matrix = { path = "../lib-q-stark-matrix", version = "0.0.2" }
lib-q-stark-rayon = { path = "../lib-q-stark-rayon", version = "0.0.2" }
lib-q-stark-util = { path = "../lib-q-stark-util", version = "0.0.2" }
itertools = { workspace = true }

[dev-dependencies]
lib-q-stark-mersenne31 = { path = "../lib-q-stark-mersenne31", version = "0.0.2" }

[features]
default = ["alloc"]
std = ["alloc"]
alloc = []
no_std = []
