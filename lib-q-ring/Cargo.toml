[package]
name = "lib-q-ring"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Shared ring arithmetic (R_q = Z_q[X]/(X^n+1)) for FIPS 204 lattice primitives"
readme = "README.md"
keywords = ["cryptography", "post-quantum", "lattice", "ml-dsa", "no-std"]
categories = ["cryptography", "no-std"]

[dependencies]
lib-q-sha3 = { path = "../lib-q-sha3", version = "0.0.2", default-features = false }
zeroize = { workspace = true, features = ["derive", "alloc"] }
subtle = { workspace = true }

[dev-dependencies]
lib-q-random = { path = "../lib-q-random", version = "0.0.2", features = ["std"] }
rand_core = { workspace = true }
hex = { workspace = true }
proptest = { workspace = true }

[features]
default = ["alloc"]
alloc = ["lib-q-sha3/alloc"]
std = ["alloc"]

[lib]
name = "lib_q_ring"
path = "src/lib.rs"
crate-type = ["rlib"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(tarpaulin)'] }
