[package]
name = "lib-q-ring"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Shared ring arithmetic (R_q = Z_q[X]/(X^n+1)) for FIPS 204 lattice primitives"
readme = "README.md"
keywords = ["cryptography", "post-quantum", "lattice", "ml-dsa", "no-std"]
categories = ["cryptography", "no-std"]

[dependencies]
lib-q-core = { path = "../lib-q-core", version = "0.0.4", default-features = false, optional = true }
lib-q-sha3 = { path = "../lib-q-sha3", version = "0.0.4", default-features = false }
rand_core = { workspace = true, default-features = false }
zeroize = { workspace = true, features = ["derive", "alloc"] }
subtle = { workspace = true }
wasm-bindgen = { workspace = true, optional = true }

[dev-dependencies]
wasm-bindgen-test = { workspace = true }

# `proptest` pulls `rand` 0.9 → `getrandom` 0.3; CI wasm builds set `getrandom_backend="wasm_js"`.
# These dev-deps are unused in this crate's sources; keep them host-only.
[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
rand_core = { workspace = true }
hex = { workspace = true }
proptest = { workspace = true }

[features]
default = ["alloc"]
alloc = ["lib-q-sha3/alloc"]
std = ["alloc"]
# Firmware / CI no_std gate (`cargo check --lib`); cdylib remains wasm-only on native host.
no_std = ["alloc", "no_std_panic_handler"]
no_std_panic_handler = []
wasm = [
    "alloc",
    "dep:wasm-bindgen",
    "dep:lib-q-core",
    "lib-q-core/wasm",
    "lib-q-core/alloc",
]

[lib]
name = "lib_q_ring"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-Oz", "--enable-bulk-memory"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(tarpaulin)'] }
