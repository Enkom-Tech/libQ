[package]
name = "lib-q-saturnin"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Saturnin post-quantum symmetric algorithm suite for lib-Q"
license.workspace = true
repository.workspace = true
keywords = ["cryptography", "post-quantum", "saturnin", "symmetric", "aead", "block-cipher"]
categories = ["cryptography"]
readme.workspace = true

[dependencies]
lib-q-core = { path = "../lib-q-core" }

# Optional dependencies for specific features
zeroize = { workspace = true, features = ["zeroize_derive"], optional = true }

[features]
default = ["aead", "block-cipher", "hash", "stream", "alloc"]
std = ["alloc"]
alloc = ["lib-q-core/alloc"]

# Algorithm modes
aead = []
aead-short = []
block-cipher = []
hash = []
stream = []

# Performance optimizations
simd = []
lookup-tables = []
parallel = []
assembly = []

# Security features
zeroize = ["dep:zeroize"]

[lib]
name = "lib_q_saturnin"
path = "src/lib.rs"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[[test]]
name = "integration_tests"
path = "tests/integration_tests.rs"
required-features = ["alloc"]

[[test]]
name = "kat_tests"
path = "tests/kat_tests.rs"
required-features = ["alloc"]

[[bench]]
name = "saturnin_benches"
harness = false
required-features = ["alloc"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }
