[package]
name = "lib-q-stark-air"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "A framework for defining Algebraic Intermediate Representations (AIRs) for constraint systems."
license.workspace = true
repository.workspace = true
readme.workspace = true

[dependencies]
lib-q-stark-field = { path = "../lib-q-stark-field" }
lib-q-stark-matrix = { path = "../lib-q-stark-matrix" }

itertools = { version = "0.14.0", default-features = false, features = ["use_alloc"] }
tracing = { version = "0.1.43", default-features = false, features = ["attributes"] }

[dev-dependencies]
lib-q-stark-mersenne31 = { path = "../lib-q-stark-mersenne31" }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }
