[dev-dependencies]
lib-q-stark-mersenne31 = { path = "../lib-q-stark-mersenne31", version = "0.0.2" }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
] }
