# Workspace configuration - uncomment when workspace members are created
[workspace]
members = [
    "lib-q-core",
    "lib-q-keccak",
    "lib-q-ascon",
    "lib-q-k12",
    "lib-q-sha3",
    "lib-q-kem",
    "lib-q-ml-kem",
    "lib-q-ml-dsa",
    "lib-q-platform",
    "lib-q-intrinsics",
    "lib-q-sig",
    "lib-q-hash",
    "lib-q-aead",
    "lib-q-hpke",
    "lib-q-utils",
    "lib-q-zkp",
    "lib-q-sponge",
    "examples",
    "."
]

# Workspace package defaults for inherited properties
[workspace.package]
authors = ["Enkom Tech", "Nexlab-One"]
license = "Apache-2.0"
homepage = "https://github.com/Enkom-Tech/libQ"
edition = "2024"
repository = "https://github.com/Enkom-Tech/libQ"
readme = "README.md"
version = "0.0.2"

# Workspace dependencies for inherited properties
[workspace.dependencies]
hax-lib = "0.3.4"

[package]
name = "lib-q"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
readme.workspace = true
description = "Post-quantum cryptography library"
keywords = ["cryptography", "post-quantum", "security", "wasm"]
categories = ["cryptography", "wasm"]
exclude = [
    "/tests",
    "/examples",
    "/benches",
    "/docs",
    "/scripts",
    "/*.py",
    "/reference",
    "/target",
]

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[lib]
name = "libq"
path = "lib.rs"
crate-type = ["cdylib", "rlib"]

[dependencies]
# Core dependencies
lib-q-core = { path = "lib-q-core", features = ["rand"] }
lib-q-kem = { path = "lib-q-kem" }
lib-q-ml-dsa = { path = "lib-q-ml-dsa" }
lib-q-sig = { path = "lib-q-sig", features = ["std", "ml-dsa"] }
lib-q-hash = { path = "lib-q-hash" }
lib-q-aead = { path = "lib-q-aead" }
lib-q-hpke = { path = "lib-q-hpke", optional = true }
lib-q-utils = { path = "lib-q-utils" }
lib-q-zkp = { path = "lib-q-zkp" }
lib-q-keccak = { path = "lib-q-keccak" }

# WASM-specific dependencies
wasm-bindgen = { version = "0.2.101", optional = true }
js-sys = { version = "0.3.78", optional = true }
web-sys = { version = "0.3.78", optional = true, features = ["console"] }

[dev-dependencies]
# Testing
criterion = "0.7.0"
proptest = "1.7.0"
quickcheck = "1.0.3"

# WASM testing
wasm-bindgen-test = "0.3.51"

[features]
default = ["std"]
std = ["alloc"]
alloc = []
no_std = []
# WASM API
wasm = ["wasm-bindgen", "js-sys", "web-sys", "lib-q-hash/wasm_js", "lib-q-core/wasm_getrandom", "lib-q-utils/wasm_js"]
# WebAssembly JavaScript integration
wasm_js = ["wasm", "lib-q-hash/wasm_js", "lib-q-core/wasm_getrandom", "lib-q-utils/wasm_js"]
# Random number generation
rand = []
# Logging support
log = []
# Experimental APIs
experimental = []
# Testing support
tests = []

# Algorithm implementations
# Re-export features from individual crates
ml-kem = ["lib-q-kem/ml-kem", "lib-q-core/ml-kem"]
ml-dsa = ["lib-q-sig/ml-dsa"]
mldsa44 = ["lib-q-ml-dsa/mldsa44"]
mldsa65 = ["lib-q-ml-dsa/mldsa65"]
mldsa87 = ["lib-q-ml-dsa/mldsa87"]

# NIST PQC Standards
sphincs = ["lib-q-sig/sphincs"]
mceliece = ["lib-q-kem/mceliece"]
hqc = ["lib-q-kem/hqc"]
fn-dsa = ["lib-q-sig/fn-dsa"]

# New Post-Quantum Algorithms
saturnin = ["lib-q-aead/saturnin"]
dawn = ["lib-q-kem/dawn"]
rcpkc = ["lib-q-kem/rcpkc"]

# Protocol implementations
hpke = ["dep:lib-q-hpke", "lib-q-hpke/std"]
zkp = ["lib-q-zkp/zkp"]

# Random number generation features
# Note: getrandom requires std in this configuration
# For no_std environments, applications must provide custom entropy sources
# For WASM, use wasm-specific getrandom configuration
getrandom = ["lib-q-core/getrandom"]

# Security features
# Enable memory zeroization for hash functions and their dependencies
zeroize = ["lib-q-hash/zeroize"]

# SIMD features
simd128 = ["lib-q-ml-dsa/simd128"]
simd256 = ["lib-q-ml-dsa/simd256"]

# Security features
# Comprehensive security hardening with zeroization and all algorithms
security-hardened = ["zeroize", "all-algorithms"]

# Convenience features
all-algorithms = ["ml-kem", "ml-dsa", "mldsa44", "mldsa65", "mldsa87", "sphincs", "mceliece", "hqc", "fn-dsa", "saturnin", "dawn", "rcpkc", "zkp"]

# Development and testing features
dev = ["experimental", "tests"]
full = ["std", "wasm", "rand", "log", "all-algorithms"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
    'cfg(simd128)',
    'cfg(simd256)',
    'cfg(aarch64)',
    'cfg(x86_64)',
] }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
debug = false

[profile.dev]
opt-level = 0
debug = true
lto = false
panic = "unwind"

[profile.release-security]
inherits = "release"
panic = "abort"

[profile.dev-security]
inherits = "dev"
panic = "unwind"

[profile.dev-no-std]
inherits = "dev"
panic = "abort"

[profile.test]
inherits = "dev"
panic = "unwind"

[profile.bench]
opt-level = 3
lto = "fat"
codegen-units = 1
debug = false

# Additional security hardening options can be added here

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

