# Workspace configuration - uncomment when workspace members are created
[workspace]
members = [
    "lib-q-core",
    "lib-q-keccak",
    "lib-q-k12",
    "lib-q-sha3",
    "lib-q-kem",
    "lib-q-ml-kem",
    "lib-q-ml-dsa",
    "lib-q-platform",
    "lib-q-intrinsics",
    "lib-q-sig",
    "lib-q-hash",
    "lib-q-aead",
    "lib-q-saturnin",
    "lib-q-hpke",
    "lib-q-utils",
    "lib-q-zkp",
    "lib-q-fn-dsa",
    "lib-q-slh-dsa",
    "lib-q-cb-kem",
    "lib-q-random",
    "lib-q-dawn",
    "lib-q-hqc",
    "lib-q-stark",
    "lib-q-stark-air",
    "lib-q-stark-challenger",
    "lib-q-stark-commit",
    "lib-q-stark-dft",
    "lib-q-stark-field",
    "lib-q-stark-field-testing",
    "lib-q-stark-fri",
    "lib-q-stark-interpolation",
    "lib-q-stark-matrix",
    "lib-q-stark-mds",
    "lib-q-stark-merkle",
    "lib-q-stark-mersenne31",
    "lib-q-stark-monty31",
    "lib-q-stark-rayon",
    "lib-q-stark-symmetric",
    "lib-q-stark-util",
    "lib-q-stark-shake256",
    "lib-q-stark-shake128",
    "lib-q-stark-sha3-256",
    "lib-q-poseidon",
    "lib-q-plonky-multilinear-util",
    "lib-q-plonky-keccak-air",
    "lib-q-plonky-lookup",
    "lib-q-plonky-uni-stark",
    "lib-q-plonky-batch-stark",
    "lib-q-plonky",
    "examples"
]

# Workspace package defaults for inherited properties
[workspace.package]
authors = ["Enkom Tech", "Nexlab-One"]
license = "Apache-2.0"
homepage = "https://github.com/Enkom-Tech/libQ"
edition = "2024"
repository = "https://github.com/Enkom-Tech/libQ"
readme = "README.md"
version = "0.0.2"
rust-version = "1.94.0"
description = "Post-quantum cryptography library"
keywords = ["cryptography", "post-quantum", "security", "wasm"]
categories = ["cryptography", "wasm"]

# Workspace dependencies for inherited properties
[workspace.dependencies]
hax-lib = "0.3.6"
blobby = "0.4.0"
# WASM dependencies - shared across all workspace members
wasm-bindgen = "0.2.114"
js-sys = "0.3.91"
web-sys = "0.3.91"
wasm-bindgen-test = "0.3.64"
# Common dependencies - shared across all workspace members
zeroize = { version = "1.8.2", default-features = false }
serde = { version = "1.0.228", default-features = false }
serde_json = { version = "1.0.149", default-features = false }
serde-wasm-bindgen = "0.6.5"
rand_core = { version = "0.10.0", default-features = false }
rand = { version = "0.10.0", default-features = false }
getrandom = { version = "0.4.2", default-features = false }
criterion = "0.8.2"
hex = "0.4.3"
proptest = "1.10.0"
cpufeatures = "0.3.0"
# STARK dependencies
itertools = { version = "0.14.0", default-features = false, features = ["use_alloc"] }
num-bigint = { version = "0.4.6", default-features = false }
pastey = "0.2.1"
spin = "0.10.0"
thiserror = { version = "2.0.18", default-features = false }
tracing = { version = "0.1.44", default-features = false, features = ["attributes"] }
subtle = { version = "2.6.1", default-features = false }
transpose = "0.2.3"
postcard = { version = "1.1.3", default-features = false }
rand_xoshiro = "0.8.0"
rayon = "1.11.0"
digest = "0.11.2"
block-buffer = "0.12.0"

[package]
name = "lib-q"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
readme.workspace = true
exclude = [
    "/tests",
    "/examples",
    "/benches",
    "/docs",
    "/scripts",
    "/*.py",
    "/reference",
    "/target",
]

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[lib]
name = "libq"
path = "lib.rs"
crate-type = ["cdylib", "rlib"]

[dependencies]
# Core dependencies
lib-q-core = { path = "lib-q-core", features = ["rand"] }
lib-q-kem = { path = "lib-q-kem" }
lib-q-ml-dsa = { path = "lib-q-ml-dsa" }
lib-q-sig = { path = "lib-q-sig", features = ["std", "ml-dsa", "slh-dsa"] }
lib-q-hash = { path = "lib-q-hash" }
lib-q-aead = { path = "lib-q-aead" }
lib-q-hqc = { path = "lib-q-hqc", optional = true }
lib-q-hpke = { path = "lib-q-hpke", optional = true }
lib-q-utils = { path = "lib-q-utils" }
lib-q-zkp = { path = "lib-q-zkp" }
lib-q-keccak = { path = "lib-q-keccak" }
lib-q-fn-dsa = { path = "lib-q-fn-dsa", optional = true }
lib-q-cb-kem = { path = "lib-q-cb-kem", optional = true }
lib-q-random = { path = "lib-q-random", optional = true }

# WASM-specific dependencies
wasm-bindgen = { workspace = true, optional = true }
js-sys = { workspace = true, optional = true }
web-sys = { workspace = true, optional = true, features = ["console"] }

[dev-dependencies]
# Testing
criterion = { workspace = true }
proptest = { workspace = true }

# WASM testing
wasm-bindgen-test = { workspace = true }

[features]
default = ["std"]
std = ["alloc"]
alloc = []
no_std = []
# WASM API
wasm = ["wasm-bindgen", "js-sys", "web-sys", "lib-q-hash/wasm_js", "lib-q-core/wasm", "lib-q-core/wasm_getrandom", "lib-q-utils/wasm_js"]
# WebAssembly JavaScript integration
wasm_js = ["wasm", "lib-q-hash/wasm_js", "lib-q-core/wasm_getrandom", "lib-q-utils/wasm_js"]
# Random number generation
rand = []
# Logging support
log = []
# Experimental APIs
experimental = []
# Testing support
tests = []

# Algorithm implementations
# Re-export features from individual crates
ml-kem = ["lib-q-kem/ml-kem"]
ml-dsa = ["lib-q-sig/ml-dsa"]
mldsa44 = ["lib-q-ml-dsa/mldsa44"]
mldsa65 = ["lib-q-ml-dsa/mldsa65"]
mldsa87 = ["lib-q-ml-dsa/mldsa87"]

# NIST PQC Standards
slh-dsa = ["lib-q-sig/slh-dsa"]
slh-dsa-std = ["lib-q-sig/slh-dsa-std"]
cb-kem = ["dep:lib-q-cb-kem", "lib-q-cb-kem/alloc", "lib-q-cb-kem/sha3-hash", "lib-q-cb-kem/zeroize", "lib-q-cb-kem/cbkem348864", "lib-q-cb-kem/getrandom", "lib-q-cb-kem/rand"]
relaxed_entropy_validation = ["lib-q-core/relaxed_entropy_validation"]
hqc = ["lib-q-kem/hqc"]
fn-dsa = ["dep:lib-q-fn-dsa", "lib-q-sig/fn-dsa"]

# New Post-Quantum Algorithms
saturnin = ["lib-q-aead/saturnin"]
dawn = ["lib-q-kem/dawn"]

# Protocol implementations
hpke = ["dep:lib-q-hpke", "lib-q-hpke/std"]
zkp = ["lib-q-zkp/zkp"]

# Random number generation features
# Note: getrandom requires std in this configuration
# For no_std environments, applications must provide custom entropy sources
# For WASM, use wasm-specific getrandom configuration
getrandom = ["lib-q-core/getrandom"]
# lib-q-random integration
random = ["dep:lib-q-random", "lib-q-random/std"]
random-custom-entropy = ["dep:lib-q-random", "lib-q-random/custom-entropy"]

# Security features
# Enable memory zeroization for hash functions and their dependencies
zeroize = ["lib-q-hash/zeroize"]

# SIMD features
simd128 = ["lib-q-ml-dsa/simd128"]
simd256 = ["lib-q-ml-dsa/simd256"]

# Security features
# Comprehensive security hardening with zeroization and all algorithms
security-hardened = ["zeroize", "all-algorithms"]

# Convenience features
all-algorithms = ["ml-kem", "ml-dsa", "mldsa44", "mldsa65", "mldsa87", "slh-dsa", "cb-kem", "hqc", "fn-dsa", "saturnin", "dawn", "zkp"]

# Development and testing features
dev = ["experimental", "tests"]
full = ["std", "wasm", "rand", "log", "all-algorithms"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(hax)',
    'cfg(eurydice)',
    'cfg(doc_cfg)',
    'cfg(simd128)',
    'cfg(simd256)',
    'cfg(aarch64)',
    'cfg(x86_64)',
    'cfg(feature, values("cb-kem"))',
] }

[profile.release-security]
inherits = "release"
panic = "abort"

[profile.dev-security]
inherits = "dev"
panic = "unwind"

[profile.dev-no-std]
inherits = "dev"
panic = "abort"

# Package-specific profiles
[profile.dev-cb-kem]
inherits = "dev"
opt-level = 1 # reduces runtime for KATNUM=2 from 281s to 11s

[profile.release-cb-kem]
inherits = "release"
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
debug = false

[profile.dev-fn-dsa]
inherits = "dev"
opt-level = 0
debug = true
lto = false
panic = "unwind"

[profile.release-fn-dsa]
inherits = "release"
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
debug = false

# Additional security hardening options can be added here

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
